<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Studio Belle — Agendamento</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
:root{
  --primary:#0077AA;--primary-deep:#004F7A;--primary-glow:#00A8D8;
  --bg:#1e3a4f;--bg-mid:#2a4f6a;
  --accent:#3DBAFF;--accent-warm:#66D4FF;
  --green-ui:#1a7a3c;--green-dk:#145e2e;--yellow-hl:#f5c800;--yellow-dk:#d4ac00;
  --white:#ffffff;--off-white:#E0F7FF;--ink:#0d1117;--ink-mid:#3a4050;--ink-soft:#5a6070;
  --hair:rgba(224,247,255,0.15);--hair-solid:rgba(224,247,255,0.08);
  --display:'Plus Jakarta Sans',system-ui,sans-serif;
  --serif:'Cormorant Garamond',Georgia,serif;
  --body:'DM Sans',system-ui,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;
  --r-sm:8px;--r-md:14px;--r-lg:20px;--r-xl:28px;

  /* ── Superfície padrão dos blocos interativos ── */
  --surface-card:#0d2d45;
  --surface-card-border:rgba(255,255,255,0.12);
  --surface-sub:#0a2438;
  --surface-sub-border:rgba(255,255,255,0.10);
}
body{font-family:var(--body);background:var(--bg);color:var(--off-white);font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;min-height:100dvh;overflow-x:hidden}
::selection{background:var(--accent);color:var(--bg)}
input,textarea,select{font-size:16px!important;-webkit-text-size-adjust:100%}

/* CONV SCREEN */
#screen-conv{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;background:#dde4ea;overflow:hidden}
.conv-masthead{position:relative;flex-shrink:0;z-index:10;background:rgba(20,45,65,0.98);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.07)}
.conv-masthead-inner{max-width:800px;margin:0 auto;padding:0 20px;height:58px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.conv-brand{display:flex;align-items:center;gap:10px;cursor:pointer}
.conv-brand-logo{width:32px;height:32px;border-radius:50%;background:radial-gradient(circle at 38% 34%,#004F7A 0%,#001830 70%);border:1.5px solid rgba(0,119,170,0.65);display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:15px;font-weight:600;font-style:italic;color:var(--off-white)}
.conv-brand-name{font-family:var(--serif);font-size:17px;font-weight:600;font-style:italic;color:var(--off-white);letter-spacing:0.02em;line-height:1}
.conv-brand-status{font-family:var(--mono);font-size:10px;font-weight:500;color:rgba(61,186,255,0.7);letter-spacing:0.06em}
.conv-progress-area{display:flex;align-items:center;gap:10px}
.conv-step-label{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:0.07em;text-transform:uppercase;color:rgba(255,255,255,0.3)}
.conv-progress-bar{width:100px;height:2px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden}
.conv-progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.5s cubic-bezier(.4,0,.2,1)}
.conv-scroll{flex:1 1 0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scroll-behavior:smooth;background:#dde4ea}
.conv-stage{max-width:800px;margin:0 auto;padding:28px 20px 20px;display:flex;flex-direction:column;min-height:100%}

/* Cards de mensagem — referência visual */
.conv-msg{display:flex;align-items:flex-start;gap:10px;margin-bottom:16px;animation:msgIn 0.38s cubic-bezier(.2,.7,.2,1) both}
@keyframes msgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.conv-avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;background:radial-gradient(circle at 38% 34%,#004F7A 0%,#001830 70%);border:1.5px solid rgba(0,119,170,0.65);display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:14px;font-weight:600;font-style:italic;color:var(--off-white);margin-top:2px}
.conv-bubble{max-width:72ch;padding:12px 16px;background:#0d2d45;border:1px solid rgba(255,255,255,0.12);border-radius:4px 16px 16px 16px;font-size:15px;line-height:1.6;color:rgba(255,255,255,0.96);font-weight:400}
.conv-bubble strong{color:#fff;font-weight:700}
.conv-bubble em{font-style:italic;color:var(--accent-warm)}
.conv-bubble.insight{background:#0a3050;border-color:rgba(61,186,255,0.3);font-size:14px}
.conv-bubble.insight::before{content:'';display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--accent);margin-right:7px;vertical-align:middle;box-shadow:0 0 0 3px rgba(61,186,255,0.18)}
.conv-typing{display:flex;align-items:center;gap:10px;margin-bottom:12px;animation:msgIn 0.3s ease both}
.conv-typing-dots{display:flex;gap:4px;align-items:center;background:#0d2d45;border:1px solid rgba(255,255,255,0.12);padding:10px 14px;border-radius:16px}
.conv-typing-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.5);animation:dotPulse 1.2s ease-in-out infinite}
.conv-typing-dot:nth-child(2){animation-delay:0.2s}
.conv-typing-dot:nth-child(3){animation-delay:0.4s}
@keyframes dotPulse{0%,80%,100%{transform:scale(0.8);opacity:0.4}40%{transform:scale(1.1);opacity:1}}

.conv-user-msg{display:flex;justify-content:flex-end;margin-bottom:16px;animation:msgIn 0.3s ease both}
.conv-user-bubble{max-width:72ch;padding:11px 16px;background:var(--primary);border-radius:16px 4px 16px 16px;font-size:14px;line-height:1.55;color:#fff;font-weight:500}

/* Área de resposta inferior */
.conv-answer-area{position:sticky;bottom:0;flex-shrink:0;z-index:50;background:rgba(14,32,48,0.97);backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,0.12);padding:12px 20px calc(14px + env(safe-area-inset-bottom,0px));animation:slideUp 0.35s cubic-bezier(.2,.7,.2,1) both;transition:opacity 0.2s ease}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
.conv-answer-inner{max-width:800px;margin:0 auto;display:flex;flex-direction:column;gap:10px}
.conv-answer-hint{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:0.07em;text-transform:uppercase;color:rgba(255,255,255,0.5)}
.conv-options{display:flex;flex-wrap:wrap;gap:8px}

/* ── Botões de opção — padronizados com a superfície dos cards ── */
.conv-option{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;background:var(--surface-card);border:1.5px solid var(--surface-card-border);border-radius:100px;font-size:13.5px;font-weight:500;color:rgba(255,255,255,0.92);cursor:pointer;transition:all 0.18s;letter-spacing:-0.005em;-webkit-tap-highlight-color:transparent}
.conv-option:hover{background:rgba(0,55,90,0.85);border-color:rgba(61,186,255,0.45);color:var(--accent)}
.conv-option:active{transform:scale(0.96)}
.conv-option.selected{background:rgba(0,55,90,0.85);border-color:rgba(61,186,255,0.65);color:var(--accent);font-weight:600}
.conv-option.selected::before{content:'✓ '}

.conv-continue-btn{display:inline-flex;align-items:center;gap:8px;padding:11px 22px;background:linear-gradient(105deg,#002040 0%,#0077AA 30%,#3DBAFF 52%,#0077AA 72%,#002040 100%);background-size:250% 100%;background-position:100% 0;border:1px solid rgba(224,247,255,0.28);border-radius:8px;font-family:var(--body);font-size:13.5px;font-weight:700;color:#fff;cursor:pointer;transition:background-position 0.5s ease,transform 0.12s,opacity 0.2s;box-shadow:0 4px 14px rgba(0,119,170,0.4);opacity:0;pointer-events:none;transform:translateY(4px);letter-spacing:-0.01em}
.conv-continue-btn.visible{opacity:1;pointer-events:auto;transform:translateY(0);transition:background-position 0.5s ease,transform 0.2s cubic-bezier(.2,.7,.2,1),opacity 0.2s}
.conv-continue-btn:hover{background-position:0% 0}
.conv-continue-btn:active{transform:scale(0.97)}
.conv-options-row{display:flex;flex-direction:column;gap:10px}
.conv-options-footer{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.conv-timer-bar{display:flex;align-items:center;gap:8px}
.conv-timer-track{flex:1;height:2px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden}
.conv-timer-fill{height:100%;background:rgba(61,186,255,0.5);border-radius:2px;transition:width 1s linear}
.conv-timer-label{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:0.06em;color:rgba(255,255,255,0.4);white-space:nowrap;flex-shrink:0;transition:color 0.3s}
.conv-timer-label.ending{color:rgba(61,186,255,0.65)}
.conv-input-row{display:flex;gap:10px;align-items:flex-end}
.conv-text-input{flex:1;padding:12px 16px;background:rgba(0,40,65,0.6);border:1.5px solid rgba(255,255,255,0.2);border-radius:10px;color:#fff;font-family:var(--body);font-size:16px;font-weight:400;outline:none;transition:border-color 0.18s,background 0.18s;resize:none;line-height:1.5}
.conv-text-input::placeholder{color:rgba(255,255,255,0.38)}
.conv-text-input:focus{border-color:rgba(61,186,255,0.65);background:rgba(0,50,80,0.7)}
.conv-send-btn{width:44px;height:44px;border-radius:10px;background:var(--primary);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 0.15s,transform 0.12s;box-shadow:0 4px 12px rgba(0,119,170,0.4)}
.conv-send-btn:hover{background:var(--primary-glow)}
.conv-send-btn:active{transform:scale(0.93)}
.conv-send-btn svg{width:17px;height:17px;color:#fff}

/* ── Accordion de serviços — superfície padronizada ── */
.svc-category-list{display:flex;flex-direction:column;gap:8px}
.svc-category-item{background:var(--surface-card);border:1.5px solid var(--surface-card-border);border-radius:var(--r-md);overflow:hidden;transition:border-color 0.2s}
.svc-category-item.open{border-color:rgba(61,186,255,0.45)}
.svc-category-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;gap:10px;-webkit-tap-highlight-color:transparent;transition:background 0.18s}
.svc-category-header:hover{background:rgba(255,255,255,0.05)}
.svc-category-header-left{display:flex;align-items:center;gap:10px}
.svc-category-num{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:0.1em;color:rgba(61,186,255,0.7)}
.svc-category-name{font-size:15px;font-weight:600;color:#fff}
.svc-category-header.has-selection .svc-category-name{color:var(--accent)}
.svc-category-chevron{width:16px;height:16px;color:rgba(255,255,255,0.55);transition:transform 0.25s ease;flex-shrink:0}
.svc-category-item.open .svc-category-chevron{transform:rotate(180deg)}
.svc-category-badge{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:0.06em;padding:2px 8px;border-radius:100px;background:rgba(0,119,170,0.4);color:var(--accent);border:1px solid rgba(61,186,255,0.4);white-space:nowrap}
.svc-category-body{max-height:0;overflow:hidden;transition:max-height 0.3s cubic-bezier(.4,0,.2,1)}
.svc-category-item.open .svc-category-body{max-height:800px}
.svc-sub-list{padding:0 10px 10px;display:flex;flex-direction:column;gap:5px}

/* ── Sub-itens de serviço — superfície padronizada ── */
.svc-sub-item{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-radius:var(--r-sm);cursor:pointer;gap:8px;background:var(--surface-sub);border:1.5px solid var(--surface-sub-border);transition:all 0.18s;-webkit-tap-highlight-color:transparent}
.svc-sub-item:hover{background:rgba(0,55,90,0.75);border-color:rgba(61,186,255,0.35);transform:translateX(3px)}
.svc-sub-item.selected{background:rgba(22,110,50,0.22);border-color:rgba(34,170,80,0.7);transform:translateX(0)}
.svc-sub-item-left{display:flex;flex-direction:column;gap:2px;flex:1}
.svc-sub-item-name{font-size:14px;font-weight:600;color:#fff;line-height:1.3}
.svc-sub-item-time{font-family:var(--mono);font-size:11px;color:rgba(61,186,255,0.7);flex-shrink:0}
.svc-sub-item.selected .svc-sub-item-time{color:#4ade80}
.svc-sub-check{width:20px;height:20px;border-radius:50%;flex-shrink:0;border:1.5px solid rgba(255,255,255,0.3);display:flex;align-items:center;justify-content:center;transition:all 0.18s}
.svc-sub-item.selected .svc-sub-check{background:#1a7a3c;border-color:#4ade80}
.svc-sub-check svg{display:none;width:10px;height:10px;color:#fff}
.svc-sub-item.selected .svc-sub-check svg{display:block}

/* ── Barra de seleção — superfície padronizada ── */
.svc-selection-bar{background:var(--surface-card);border:1.5px solid rgba(61,186,255,0.28);border-radius:var(--r-sm);padding:10px 14px;display:none}
.svc-selection-bar.has-items{display:block}
.svc-selection-bar-label{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--accent);margin-bottom:6px}
.svc-chips{display:flex;flex-wrap:wrap;gap:5px}
.svc-chip{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:100px;background:rgba(0,119,170,0.45);border:1px solid rgba(61,186,255,0.45);font-size:12px;font-weight:600;color:#fff}
.svc-chip-x{cursor:pointer;font-size:13px;font-weight:700;opacity:0.65}
.svc-chip-x:hover{opacity:1}

/* Pickers */
.picker-overlay{position:fixed;inset:0;z-index:500;display:flex;align-items:flex-end;justify-content:center;background:rgba(0,5,10,0);pointer-events:none;transition:background 250ms ease;overflow:hidden}
.picker-overlay.open{background:rgba(0,5,10,0.88);pointer-events:auto}

/* ── Painel do picker — superfície padronizada ── */
.picker-panel{background:linear-gradient(170deg,#0a2236 0%,#0f2d45 100%);border:1px solid rgba(0,119,170,0.45);border-radius:16px 16px 0 0;padding:0 0 32px;width:100%;max-width:600px;box-sizing:border-box;overflow-x:hidden;transform:translateY(100%);transition:transform 320ms cubic-bezier(0.25,0.46,0.45,0.94);max-height:80dvh;overflow-y:auto}
.picker-overlay.open .picker-panel{transform:translateY(0)}
.picker-drag{display:flex;justify-content:center;padding:12px 0 0}
.picker-drag span{width:36px;height:3px;background:rgba(0,119,170,0.45);border-radius:2px;display:block}
.picker-title{font-family:var(--mono);font-size:10.5px;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:rgba(255,255,255,0.85);text-align:center;padding:12px 20px 14px;border-bottom:1px solid rgba(0,119,170,0.22)}
.cal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 8px}
.cal-month{font-family:var(--serif);font-size:20px;font-weight:600;font-style:italic;color:var(--off-white);letter-spacing:0.03em}
.cal-nav-btn{background:none;border:none;cursor:pointer;color:rgba(224,247,255,0.75);padding:6px;border-radius:4px;transition:color 150ms,background 150ms;display:flex;align-items:center;justify-content:center;min-width:36px;min-height:36px;-webkit-tap-highlight-color:transparent}
.cal-nav-btn:hover{color:#fff;background:rgba(0,119,170,0.25)}
.cal-grid{padding:0 12px 8px}
.cal-dow-row{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px}
.cal-dow{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:rgba(224,247,255,0.55);text-align:center;padding:4px 0}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:50%;font-family:var(--body);font-size:14px;font-weight:500;color:#fff;cursor:pointer;transition:background 150ms,color 150ms;min-height:40px;-webkit-tap-highlight-color:transparent}
.cal-day:hover:not(.cal-day--disabled):not(.cal-day--empty){background:rgba(0,119,170,0.35)}
.cal-day--disabled{color:rgba(224,247,255,0.25);cursor:not-allowed}
.cal-day--empty{pointer-events:none}
.cal-day--today{border:1.5px solid rgba(0,119,170,0.65)}
.cal-day--selected{background:var(--primary)!important;color:#fff!important;font-weight:700}

/* ── Slots de horário — superfície padronizada ── */
.time-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:12px 16px 4px;box-sizing:border-box;width:100%}
.time-slot{display:flex;align-items:center;justify-content:center;padding:11px 4px;border-radius:6px;font-family:var(--body);font-size:14px;font-weight:500;color:#fff;background:var(--surface-card);border:1.5px solid var(--surface-card-border);cursor:pointer;transition:background 150ms,border-color 150ms;-webkit-tap-highlight-color:transparent;min-height:44px;min-width:0;box-sizing:border-box;overflow:hidden}
.time-slot:hover{background:rgba(0,55,90,0.85);border-color:rgba(61,186,255,0.4)}
.time-slot.selected{background:var(--primary);border-color:var(--accent);color:#fff;font-weight:700}

/* ── Card de resumo — superfície padronizada ── */
.conv-summary-card{background:var(--surface-card);border:1.5px solid rgba(61,186,255,0.22);border-radius:var(--r-md);overflow:hidden;margin-bottom:16px}
.conv-summary-row{display:flex;padding:11px 16px;border-bottom:1px solid rgba(255,255,255,0.07)}
.conv-summary-row:last-child{border-bottom:none}
.conv-summary-label{font-family:var(--mono);font-size:10.5px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.55);flex:0 0 100px}
.conv-summary-value{font-size:13.5px;font-weight:500;color:#fff;line-height:1.6;flex:1}

/* ── Área de datas — superfície padronizada ── */
.conv-dates-section{display:flex;flex-direction:column;gap:12px;margin-bottom:14px}
.conv-date-row{display:flex;flex-direction:column;gap:6px}
.conv-date-label{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;color:rgba(255,255,255,0.7)}
.conv-date-label .req{color:var(--accent)}
.conv-date-label .opt{color:rgba(255,255,255,0.38);font-weight:500}
.conv-date-inputs{display:flex;gap:8px}
.conv-date-input,.conv-time-input{flex:1;padding:11px 14px;background:var(--surface-card);border:1.5px solid var(--surface-card-border);border-radius:8px;color:#fff;font-family:var(--body);font-size:16px;font-weight:500;cursor:pointer;outline:none;transition:border-color 0.18s;-webkit-appearance:none;appearance:none;min-width:0;box-sizing:border-box}
.conv-date-input::placeholder,.conv-time-input::placeholder{color:rgba(255,255,255,0.35)}
.conv-date-input:focus,.conv-time-input:focus{border-color:rgba(61,186,255,0.65)}
.conv-date-input.field-error{border-color:rgba(220,50,70,0.8)}
.conv-date-error{font-family:var(--mono);font-size:11px;font-weight:600;color:#FF5060;min-height:14px}
.conv-form-hint{font-size:13px;line-height:1.6;color:rgba(255,255,255,0.6);margin-bottom:12px}
.conv-form-hint .hl{color:var(--accent);font-weight:600}

/* Botões de ação */
.conv-action-btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;padding:13px 22px;width:100%;background:linear-gradient(105deg,#002040 0%,#0077AA 30%,#3DBAFF 52%,#0077AA 72%,#002040 100%);background-size:250% 100%;background-position:100% 0;border:1px solid rgba(224,247,255,0.25);border-radius:8px;font-family:var(--body);font-size:14px;font-weight:700;color:#fff;cursor:pointer;margin-top:12px;transition:background-position 0.5s ease,transform 0.12s,box-shadow 0.18s;box-shadow:0 4px 16px rgba(0,119,170,0.38);letter-spacing:-0.01em;-webkit-tap-highlight-color:transparent}
.conv-action-btn:hover{background-position:0% 0;box-shadow:0 4px 24px rgba(0,168,216,0.55)}
.conv-action-btn:active{transform:scale(0.98)}
.conv-action-btn.ghost{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.18);box-shadow:none;color:rgba(255,255,255,0.7);font-weight:600;margin-top:6px}
.conv-action-btn.ghost:hover{background:rgba(255,255,255,0.14);color:#fff}
.conv-wa-btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;padding:14px 24px;width:100%;background:#25d366;color:#fff;font-family:var(--body);font-size:14px;font-weight:700;border:none;border-radius:8px;cursor:pointer;margin-top:12px;transition:background 0.15s,transform 0.12s;box-shadow:0 4px 16px rgba(37,211,102,0.35);letter-spacing:-0.01em;-webkit-tap-highlight-color:transparent}
.conv-wa-btn:hover{background:#1eb558}
.conv-wa-btn:active{transform:scale(0.98)}

/* ── Cards de profissional — superfície padronizada ── */
.prof-cards{display:flex;flex-direction:column;gap:8px}
.prof-card{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--surface-card);border:1.5px solid var(--surface-card-border);border-radius:var(--r-md);cursor:pointer;transition:all 0.2s;-webkit-tap-highlight-color:transparent}
.prof-card:hover{background:rgba(0,55,90,0.85);border-color:rgba(61,186,255,0.38)}
.prof-card.selected{background:rgba(0,55,90,0.9);border-color:rgba(61,186,255,0.65)}
.prof-avatar{width:36px;height:36px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,rgba(0,168,216,0.3),rgba(0,79,122,0.55));border:1.5px solid rgba(224,247,255,0.28);display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:15px;font-weight:600;font-style:italic;color:rgba(224,247,255,0.9)}
.prof-name{font-size:15px;font-weight:600;color:#fff;flex:1}
.conv-inline-block{margin-top:4px;margin-bottom:20px;animation:msgIn 0.38s cubic-bezier(.2,.7,.2,1) both}
.conv-inline-block.indent{padding-left:42px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#0d1117;color:#fff;padding:11px 18px;border-radius:9px;font-size:13px;font-weight:600;z-index:999;opacity:0;pointer-events:none;transition:opacity 0.22s,transform 0.28s cubic-bezier(.2,.7,.2,1);white-space:nowrap;box-shadow:0 8px 24px rgba(10,14,26,0.25);display:flex;align-items:center;gap:7px}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(61,186,255,0.22);border-radius:2px}
@media(max-width:480px){
  .time-grid{grid-template-columns:repeat(3,1fr);gap:5px;padding:12px 12px 4px}
  .time-slot{font-size:13.5px;padding:11px 2px;min-height:44px}
  .picker-panel{border-radius:12px 12px 0 0}
  .conv-stage{padding:20px 16px 16px}
  .conv-answer-area{padding:10px 16px calc(12px + env(safe-area-inset-bottom,0px))}
  .conv-option{font-size:13px;padding:8px 13px}
}
</style>
</head>
<body>

<div id="screen-conv">
  <header class="conv-masthead">
    <div class="conv-masthead-inner">
      <div class="conv-brand">
        <div class="conv-brand-logo">S</div>
        <div class="conv-brand-info">
          <div class="conv-brand-name">Studio Belle</div>
          <div class="conv-brand-status">&#9679; online agora</div>
        </div>
      </div>
      <div class="conv-progress-area">
        <div class="conv-step-label" id="conv-step-label"></div>
        <div class="conv-progress-bar"><div class="conv-progress-fill" id="conv-progress-fill" style="width:0%"></div></div>
      </div>
    </div>
  </header>
  <div class="conv-scroll" id="conv-scroll">
    <div class="conv-stage" id="conv-stage"></div>
  </div>
  <div class="conv-answer-area" id="conv-answer-area" style="display:none">
    <div class="conv-answer-inner" id="conv-answer-inner"></div>
  </div>
</div>

<div class="picker-overlay" id="date-picker-overlay" onclick="handlePickerOverlay(event,'date-picker-overlay')">
  <div class="picker-panel">
    <div class="picker-drag"><span></span></div>
    <div class="picker-title" id="date-picker-title">Escolha a data</div>
    <div class="cal-header">
      <button class="cal-nav-btn" onclick="calPrev()"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8L10 13" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
      <div class="cal-month" id="cal-month-label"></div>
      <button class="cal-nav-btn" onclick="calNext()"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 3L11 8L6 13" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
    </div>
    <div class="cal-grid">
      <div class="cal-dow-row" id="cal-dow-row"></div>
      <div class="cal-days" id="cal-days"></div>
    </div>
  </div>
</div>

<div class="picker-overlay" id="time-picker-overlay" onclick="handlePickerOverlay(event,'time-picker-overlay')">
  <div class="picker-panel">
    <div class="picker-drag"><span></span></div>
    <div class="picker-title" id="time-picker-title">Escolha o horario</div>
    <div class="time-grid" id="time-grid"></div>
    <div style="height:12px"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const WHATSAPP='5583998508419';
const GLOBAL_PROFESSIONALS=[{val:'leticia',name:'Leticia'},{val:'julia',name:'Julia'},{val:'sem',name:'Sem preferencia'}];
const PROFESSIONALS={cabelo:GLOBAL_PROFESSIONALS,unhas:GLOBAL_PROFESSIONALS,sobrancelhas:GLOBAL_PROFESSIONALS,estetica:GLOBAL_PROFESSIONALS};
const SERVICES={
  cabelo:[
    {key:'corte',name:'Corte',time:'45\u201360 min',subs:['Feminino','Masculino','Infantil']},
    {key:'escova',name:'Escova e finalizacao',time:'40\u201370 min',subs:['Escova','Babyliss','Penteados']},
    {key:'coloracao',name:'Coloracao',time:'90\u2013180 min',subs:['Coloracao','Luzes','Mechas','Tonalizacao']},
    {key:'tratamento',name:'Tratamentos',time:'50\u201370 min',subs:['Hidratacao','Reconstrucao','Nutricao']},
    {key:'transform',name:'Transformacao',time:'150\u2013180 min',subs:['Progressiva','Botox capilar','Alisamento']},
  ],
  unhas:[
    {key:'cuidados',name:'Cuidados',time:'40\u201350 min',subs:['Manicure','Pedicure']},
    {key:'esmaltacao',name:'Esmaltacao',time:'30\u201360 min',subs:['Esmalte comum','Gel']},
    {key:'estrutura',name:'Estrutura',time:'120 min',subs:['Alongamento']},
    {key:'nailart',name:'Nail art',time:'45 min',subs:['Decoracao']},
  ],
  sobrancelhas:[
    {key:'sobrancelha',name:'Sobrancelhas',time:'30\u2013120 min',subs:['Design','Henna','Micropigmentacao']},
    {key:'cilios',name:'Cilios',time:'70\u2013120 min',subs:['Alongamento','Lifting']},
  ],
  estetica:[
    {key:'maquiagem',name:'Maquiagem',time:'60\u201390 min',subs:['Social','Eventos']},
    {key:'pele',name:'Pele',time:'90 min',subs:['Limpeza de pele']},
    {key:'corporal',name:'Corporal',time:'60 min',subs:['Depilacao','Massagem']},
    {key:'facial',name:'Tratamentos',time:'75\u201390 min',subs:['Facial','Corporal']},
  ],
};
const CAT_LABELS={cabelo:'Cabelo',unhas:'Unhas',sobrancelhas:'Sobrancelhas e cilios',estetica:'Estetica e maquiagem'};
const MONTHS_PT=['Janeiro','Fevereiro','Marco','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const DOWS=['Dom','Seg','Ter','Qua','Qui','Sex','Sab'];

let st={nome:'',bookings:[],dates:['','',''],tmpCat:null,tmpProf:null,tmpServices:{}};
let convTimerID=null;

window.addEventListener('load',()=>{
  document.body.style.overflow='hidden';
  setTimeout(()=>startFlow(),350);
});

function setProgress(pct,label){
  document.getElementById('conv-progress-fill').style.width=pct+'%';
  document.getElementById('conv-step-label').textContent=label;
}
function showTyping(){
  removeTyping();
  const el=document.createElement('div');
  el.id='conv-typing';el.className='conv-typing';
  el.innerHTML='<div class="conv-avatar">S</div><div class="conv-typing-dots"><div class="conv-typing-dot"></div><div class="conv-typing-dot"></div><div class="conv-typing-dot"></div></div>';
  document.getElementById('conv-stage').appendChild(el);scrollBottom();
}
function removeTyping(){const el=document.getElementById('conv-typing');if(el)el.remove();}
function addBotMsg(html,isInsight=false){
  removeTyping();
  const stage=document.getElementById('conv-stage');
  const w=document.createElement('div');w.className='conv-msg';
  w.innerHTML='<div class="conv-avatar">S</div><div class="conv-bubble'+(isInsight?' insight':'')+'">'+html+'</div>';
  stage.appendChild(w);scrollBottom();
}
function addUserMsg(text){
  const stage=document.getElementById('conv-stage');
  const el=document.createElement('div');el.className='conv-user-msg';
  el.innerHTML='<div class="conv-user-bubble">'+esc(text)+'</div>';
  stage.appendChild(el);scrollBottom();
}
function addInlineBlock(buildFn,indent=true){
  const stage=document.getElementById('conv-stage');
  const el=document.createElement('div');
  el.className='conv-inline-block'+(indent?' indent':'');
  buildFn(el);stage.appendChild(el);scrollBottom();return el;
}
function hideAnswerArea(){const a=document.getElementById('conv-answer-area');a.style.opacity='0';a.style.pointerEvents='none';}
function showAnswerArea(){const a=document.getElementById('conv-answer-area');a.style.display='';a.style.opacity='1';a.style.pointerEvents='auto';}
function renderAnswerArea(buildFn){
  const inner=document.getElementById('conv-answer-inner');inner.innerHTML='';
  if(convTimerID){clearInterval(convTimerID);convTimerID=null;}
  buildFn(inner);showAnswerArea();scrollBottom();
}
function clearAnswerArea(){hideAnswerArea();document.getElementById('conv-answer-inner').innerHTML='';}
function scrollBottom(){setTimeout(()=>{const sc=document.getElementById('conv-scroll');if(sc)sc.scrollTo({top:sc.scrollHeight,behavior:'smooth'});},60);}

function sendMessages(msgs,onDone){
  let t=0;
  msgs.forEach((m,i)=>{
    const delay=m.delay||0;
    setTimeout(()=>{if(i>0)showTyping();},delay);
    const md=delay+(i>0?850:0);t=md+300;
    setTimeout(()=>{addBotMsg(m.html,m.insight||false);},md);
  });
  setTimeout(()=>onDone&&onDone(),t+100);
}

function buildChipsArea(inner,{hint,options,timed,multi,onSubmit}){
  const selectedVals=new Set();
  const hintEl=document.createElement('div');hintEl.className='conv-answer-hint';hintEl.textContent=hint||(multi?'Escolha uma ou mais opcoes':'Escolha uma opcao');inner.appendChild(hintEl);
  const row=document.createElement('div');row.className='conv-options-row';inner.appendChild(row);
  const opts=document.createElement('div');opts.className='conv-options';row.appendChild(opts);
  const continueBtn=document.createElement('button');continueBtn.className='conv-continue-btn';
  continueBtn.innerHTML='Continuar <svg viewBox="0 0 14 14" fill="none"><path d="M3 7h8M7.5 3.5L11 7l-3.5 3.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  const footer=document.createElement('div');footer.className='conv-options-footer';row.appendChild(footer);
  function doSubmit(){if(selectedVals.size===0)return;if(convTimerID){clearInterval(convTimerID);convTimerID=null;}const vals=[...selectedVals];onSubmit(vals,vals.join(', '));}
  function updateContinue(){
    if(selectedVals.size>0){
      continueBtn.classList.add('visible');
      continueBtn.innerHTML=selectedVals.size>1?selectedVals.size+' selecionados · Continuar <svg viewBox="0 0 14 14" fill="none"><path d="M3 7h8M7.5 3.5L11 7l-3.5 3.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>':'Continuar <svg viewBox="0 0 14 14" fill="none"><path d="M3 7h8M7.5 3.5L11 7l-3.5 3.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    }else{continueBtn.classList.remove('visible');}
  }
  continueBtn.onclick=doSubmit;
  options.forEach(opt=>{
    const btn=document.createElement('button');btn.className='conv-option';
    btn.textContent=typeof opt==='string'?opt:opt.label;
    const val=typeof opt==='string'?opt:opt.val;
    btn.onclick=()=>{
      if(!multi){if(convTimerID){clearInterval(convTimerID);convTimerID=null;}onSubmit([val],val);return;}
      if(selectedVals.has(val)){selectedVals.delete(val);btn.classList.remove('selected');}else{selectedVals.add(val);btn.classList.add('selected');}
      updateContinue();
    };
    opts.appendChild(btn);
  });
  if(timed){
    let secs=25;
    const timerBar=document.createElement('div');timerBar.className='conv-timer-bar';timerBar.style.flex='1';
    timerBar.innerHTML='<div class="conv-timer-track"><div class="conv-timer-fill" id="ctf" style="width:100%"></div></div><div class="conv-timer-label" id="ctl">25s</div>';
    footer.appendChild(timerBar);footer.appendChild(continueBtn);
    convTimerID=setInterval(()=>{
      secs--;
      const fill=timerBar.querySelector('#ctf');const lbl=timerBar.querySelector('#ctl');
      if(fill)fill.style.width=Math.max(0,(secs/25)*100)+'%';
      if(lbl){lbl.textContent=secs+'s';if(secs<=8)lbl.classList.add('ending');}
      if(secs<=0){clearInterval(convTimerID);convTimerID=null;if(selectedVals.size===0)selectedVals.add(typeof options[0]==='string'?options[0]:options[0].val);doSubmit();}
    },1000);
  }else{if(multi)footer.appendChild(continueBtn);}
}

function startFlow(){
  setProgress(5,'Iniciando...');
  sendMessages([
    {html:'Ola! Seja muito bem-vinda ao Studio Belle ✨',delay:0},
    {html:'Estou aqui para te ajudar a montar seu atendimento perfeito. Vai levar so alguns minutinhos.',delay:1200},
    {html:'<strong>Como posso te chamar?</strong>',delay:2400},
  ],()=>{
    renderAnswerArea((inner)=>{
      const hintEl=document.createElement('div');hintEl.className='conv-answer-hint';hintEl.textContent='Digite seu nome';inner.appendChild(hintEl);
      const row=document.createElement('div');row.className='conv-input-row';
      const input=document.createElement('textarea');
      input.className='conv-text-input';input.placeholder='Ex: Ana, Maria, Carol...';input.rows=1;input.id='nome-input';
      input.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();submitNome();}});
      const btn=document.createElement('button');btn.className='conv-send-btn';
      btn.innerHTML='<svg viewBox="0 0 18 18" fill="none"><path d="M2 9l14-7-7 14V9H2z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>';
      btn.onclick=submitNome;row.appendChild(input);row.appendChild(btn);inner.appendChild(row);
      setTimeout(()=>input.focus(),300);
    });
  });
}

function submitNome(){
  const input=document.getElementById('nome-input');
  const val=input?input.value.trim():'';
  if(!val){if(input)input.focus();return;}
  st.nome=val;addUserMsg(val);clearAnswerArea();setProgress(12,'Etapa 1 de 4');
  setTimeout(()=>{
    sendMessages([
      {html:'Prazer, <strong>'+esc(st.nome)+'</strong>! \uD83D\uDC9B',delay:0},
      {html:'Vamos montar seu atendimento. <em>Me conta o que voce gostaria de fazer hoje?</em>',delay:1000},
    ],()=>stepCategoria());
  },400);
}

function stepCategoria(){
  const booked=st.bookings.map(b=>b.category);
  const avail=Object.keys(CAT_LABELS).filter(k=>!booked.includes(k));
  if(avail.length===0){stepDatas();return;}
  renderAnswerArea((inner)=>{
    buildChipsArea(inner,{
      hint:'Escolha uma categoria',
      options:avail.map(k=>({val:k,label:CAT_LABELS[k]})),
      timed:false,multi:false,
      onSubmit:([val])=>{
        st.tmpCat=val;st.tmpProf=null;st.tmpServices={};
        addUserMsg(CAT_LABELS[val]);clearAnswerArea();
        setTimeout(()=>{
          sendMessages([
            {html:'<em>'+CAT_LABELS[val]+'</em> \u2014 otima escolha ✨',delay:0},
            {html:'Voce tem preferencia por alguma profissional?',delay:900},
          ],()=>stepProfissional());
        },400);
      }
    });
  });
}

function stepProfissional(){
  setProgress(28,'Etapa 1 de 4 \u2014 Preferencias');
  const profs=PROFESSIONALS[st.tmpCat]||[];
  renderAnswerArea((inner)=>{
    const hintEl=document.createElement('div');hintEl.className='conv-answer-hint';hintEl.textContent='Escolha uma profissional';inner.appendChild(hintEl);
    const cards=document.createElement('div');cards.className='prof-cards';
    profs.forEach(p=>{
      const card=document.createElement('div');card.className='prof-card';
      const initials=p.val==='sem'?'\u2726':p.name[0];
      card.innerHTML='<div class="prof-avatar">'+initials+'</div><div class="prof-name">'+esc(p.name)+'</div>';
      card.onclick=()=>{
        st.tmpProf=p.val;addUserMsg(p.name);clearAnswerArea();
        setTimeout(()=>{
          sendMessages([{html:'Perfeito \uD83D\uDC9B Agora me conta: <strong>que procedimentos de '+CAT_LABELS[st.tmpCat].toLowerCase()+' voce quer incluir?</strong>',delay:0}],()=>stepServicos());
        },400);
      };
      cards.appendChild(card);
    });
    inner.appendChild(cards);
  });
}

function stepServicos(){
  setProgress(45,'Etapa 2 de 4 \u2014 Servicos');
  const svcs=SERVICES[st.tmpCat]||[];
  clearAnswerArea();hideAnswerArea();
  addInlineBlock(el=>{
    el.id='svc-block';
    const selBar=document.createElement('div');selBar.className='svc-selection-bar';selBar.id='svc-sel-bar';
    selBar.innerHTML='<div class="svc-selection-bar-label">Selecionados</div><div class="svc-chips" id="svc-chips"></div>';
    el.appendChild(selBar);
    const list=document.createElement('div');list.className='svc-category-list';
    svcs.forEach((svc,idx)=>{
      const item=document.createElement('div');item.className='svc-category-item';item.id='svc-cat-'+svc.key;
      const header=document.createElement('div');header.className='svc-category-header';
      header.innerHTML='<div class="svc-category-header-left"><span class="svc-category-num">0'+(idx+1)+'</span><span class="svc-category-name" id="svc-name-'+svc.key+'">'+esc(svc.name)+'</span></div><div style="display:flex;align-items:center;gap:8px"><span class="svc-category-badge" id="svc-badge-'+svc.key+'" style="display:none"></span><svg class="svc-category-chevron" viewBox="0 0 14 14" fill="none"><path d="M3 5l4 4 4-4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></div>';
      header.onclick=()=>toggleSvcAccordion(svc.key,svcs);
      const body=document.createElement('div');body.className='svc-category-body';body.id='svc-body-'+svc.key;
      const subList=document.createElement('div');subList.className='svc-sub-list';
      svc.subs.forEach(sub=>{
        const subId=svc.key+'__'+sub.replace(/\s+/g,'_');
        const subItem=document.createElement('div');subItem.className='svc-sub-item';subItem.id='svc-sub-item-'+subId;
        subItem.innerHTML='<div class="svc-sub-item-left"><div class="svc-sub-item-name">'+esc(sub)+'</div></div><div style="display:flex;align-items:center;gap:8px;flex-shrink:0"><span class="svc-sub-item-time">'+esc(svc.time)+'</span><div class="svc-sub-check" id="svc-check-'+subId+'"><svg viewBox="0 0 10 10" fill="none"><path d="M2 5l2 2 4-4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></div></div>';
        subItem.onclick=()=>toggleSubItem(svc.key,sub,svc.time,subId);
        subList.appendChild(subItem);
      });
      body.appendChild(subList);item.appendChild(header);item.appendChild(body);list.appendChild(item);
    });
    el.appendChild(list);
    const btn=document.createElement('button');btn.className='conv-action-btn';btn.id='svc-confirm-btn';btn.textContent='Confirmar servicos';btn.onclick=confirmServicos;el.appendChild(btn);
  },true);
}

function toggleSvcAccordion(key,svcs){
  const item=document.getElementById('svc-cat-'+key);const isOpen=item.classList.contains('open');
  (svcs||SERVICES[st.tmpCat]||[]).forEach(s=>{const it=document.getElementById('svc-cat-'+s.key);if(it)it.classList.remove('open');});
  if(!isOpen)item.classList.add('open');
}

function toggleSubItem(parentKey,subName,time,subId){
  const stateKey=parentKey+'__'+subName.replace(/\s+/g,'_');
  const subItem=document.getElementById('svc-sub-item-'+subId);
  const badge=document.getElementById('svc-badge-'+parentKey);
  const header=document.querySelector('#svc-cat-'+parentKey+' .svc-category-header');
  if(st.tmpServices[stateKey]){delete st.tmpServices[stateKey];if(subItem)subItem.classList.remove('selected');}
  else{st.tmpServices[stateKey]={name:subName,time:time,parentKey:parentKey};if(subItem)subItem.classList.add('selected');}
  const cnt=Object.values(st.tmpServices).filter(s=>s.parentKey===parentKey).length;
  if(badge){if(cnt>0){badge.textContent=cnt;badge.style.display='';}else badge.style.display='none';}
  if(header)header.classList.toggle('has-selection',cnt>0);
  updateSvcSelectionBar();
}

function updateSvcSelectionBar(){
  const bar=document.getElementById('svc-sel-bar');const chips=document.getElementById('svc-chips');if(!bar||!chips)return;
  const entries=Object.entries(st.tmpServices);
  bar.classList.toggle('has-items',entries.length>0);
  chips.innerHTML=entries.map(([key,info])=>'<div class="svc-chip">'+esc(info.name)+'<span class="svc-chip-x" onclick="removeSubItem(\''+key+'\')">x</span></div>').join('');
}

function removeSubItem(stateKey){
  const info=st.tmpServices[stateKey];if(!info)return;
  const parentKey=info.parentKey;delete st.tmpServices[stateKey];
  const subItem=document.getElementById('svc-sub-item-'+stateKey);if(subItem)subItem.classList.remove('selected');
  const badge=document.getElementById('svc-badge-'+parentKey);const header=document.querySelector('#svc-cat-'+parentKey+' .svc-category-header');
  const cnt=Object.values(st.tmpServices).filter(s=>s.parentKey===parentKey).length;
  if(badge){if(cnt>0){badge.textContent=cnt;badge.style.display='';}else badge.style.display='none';}
  if(header)header.classList.toggle('has-selection',cnt>0);
  updateSvcSelectionBar();
}

function confirmServicos(){
  if(Object.keys(st.tmpServices).length===0){showToast('Selecione ao menos um procedimento ✨');return;}
  const profLabel=(PROFESSIONALS[st.tmpCat]||[]).find(p=>p.val===st.tmpProf);
  st.bookings=st.bookings.filter(b=>b.category!==st.tmpCat);
  st.bookings.push({category:st.tmpCat,categoryLabel:CAT_LABELS[st.tmpCat],prof:st.tmpProf,profLabel:profLabel?profLabel.name:'Sem preferencia',services:{...st.tmpServices}});
  st.tmpServices={};
  const block=document.getElementById('svc-block');
  if(block){const btn=block.querySelector('.conv-action-btn');if(btn)btn.style.display='none';block.style.pointerEvents='none';block.style.opacity='0.6';}
  const svcNames=Object.values(st.bookings[st.bookings.length-1].services).map(s=>s.name).join(', ');
  addUserMsg(svcNames);
  const booked=st.bookings.map(b=>b.category);const avail=Object.keys(CAT_LABELS).filter(k=>!booked.includes(k));
  setTimeout(()=>{
    if(avail.length>0){
      sendMessages([{html:'Anotado! ✅',delay:0},{html:'Quer adicionar mais alguma categoria de servico, ou podemos seguir para as datas?',delay:900}],()=>{
        setProgress(58,'Etapa 2 de 4 \u2014 Mais servicos?');
        renderAnswerArea((inner)=>{
          const opts=[...avail.map(k=>({val:'cat_'+k,label:'+ '+CAT_LABELS[k]})),{val:'finalizar',label:'\u2192 Seguir para datas'}];
          buildChipsArea(inner,{hint:'O que deseja fazer?',options:opts,timed:false,multi:false,onSubmit:([val])=>{
            if(val==='finalizar'){addUserMsg('Seguir para as datas');clearAnswerArea();setTimeout(()=>stepDatas(),400);}
            else{const cat=val.replace('cat_','');st.tmpCat=cat;st.tmpProf=null;st.tmpServices={};addUserMsg(CAT_LABELS[cat]);clearAnswerArea();
              setTimeout(()=>{sendMessages([{html:'<em>'+CAT_LABELS[cat]+'</em> \u2014 otima escolha ✨',delay:0},{html:'Voce tem preferencia por alguma profissional?',delay:900}],()=>stepProfissional());},400);}
          }});
        });
      });
    }else{sendMessages([{html:'Perfeito! Vamos escolher as melhores datas para voce \uD83D\uDCC5',delay:0}],()=>stepDatas());}
  },500);
}

function stepDatas(){
  setProgress(72,'Etapa 3 de 4 \u2014 Disponibilidade');
  sendMessages([
    {html:'Agora me informe <strong>ate 3 opcoes de dias e horarios</strong> que funcionam melhor para voce.',delay:0},
    {html:'Assim conseguimos encontrar o encaixe perfeito na nossa agenda \uD83D\uDC9B',delay:1000,insight:true},
  ],()=>{
    clearAnswerArea();hideAnswerArea();
    addInlineBlock(el=>{
      el.id='dates-block';
      el.innerHTML='<div class="conv-form-hint">Apenas a <span class="hl">1a opcao</span> e obrigatoria.</div><div class="conv-dates-section"><div class="conv-date-row"><span class="conv-date-label">1a opcao <span class="req">*</span></span><div class="conv-date-inputs"><input class="conv-date-input" id="d1" readonly placeholder="Data" onclick="openDatePicker(1)"><input class="conv-time-input" id="t1" readonly placeholder="Horario" onclick="openTimePicker(1)"></div></div><div class="conv-date-row"><span class="conv-date-label">2a opcao <span class="opt">(opcional)</span></span><div class="conv-date-inputs"><input class="conv-date-input" id="d2" readonly placeholder="Data" onclick="openDatePicker(2)"><input class="conv-time-input" id="t2" readonly placeholder="Horario" onclick="openTimePicker(2)"></div></div><div class="conv-date-row"><span class="conv-date-label">3a opcao <span class="opt">(opcional)</span></span><div class="conv-date-inputs"><input class="conv-date-input" id="d3" readonly placeholder="Data" onclick="openDatePicker(3)"><input class="conv-time-input" id="t3" readonly placeholder="Horario" onclick="openTimePicker(3)"></div></div></div><div class="conv-date-error" id="date-error"></div><button class="conv-action-btn" onclick="submitDatas()">Confirmar disponibilidade</button>';
    },true);
  });
}

function submitDatas(){
  const d1=v('d1'),t1=v('t1'),d2=v('d2'),t2=v('t2'),d3=v('d3'),t3=v('t3');
  const err=document.getElementById('date-error');
  ['d1','t1','d2','t2','d3','t3'].forEach(id=>{const el=document.getElementById(id);if(el)el.classList.remove('field-error');});
  const fail=(msg,...ids)=>{if(err)err.textContent=msg;ids.forEach(id=>{const el=document.getElementById(id);if(el)el.classList.add('field-error');});return false;};
  if(!d1)return fail('Selecione a data da 1a opcao.','d1');
  if(!t1)return fail('Selecione o horario da 1a opcao.','t1');
  if(d2&&!t2)return fail('Selecione o horario da 2a opcao.','t2');
  if(!d2&&t2)return fail('Selecione a data da 2a opcao.','d2');
  if(d3&&!t3)return fail('Selecione o horario da 3a opcao.','t3');
  if(!d3&&t3)return fail('Selecione a data da 3a opcao.','d3');
  const fmt=(d,t)=>d+' as '+t;
  if(d2&&t2&&fmt(d1,t1)===fmt(d2,t2))return fail('1a e 2a opcao tem o mesmo horario.','d1','t1','d2','t2');
  if(d3&&t3&&fmt(d1,t1)===fmt(d3,t3))return fail('1a e 3a opcao tem o mesmo horario.');
  if(d2&&t2&&d3&&t3&&fmt(d2,t2)===fmt(d3,t3))return fail('2a e 3a opcao tem o mesmo horario.');
  if(err)err.textContent='';
  st.dates[0]=fmt(d1,t1);st.dates[1]=d2&&t2?fmt(d2,t2):'';st.dates[2]=d3&&t3?fmt(d3,t3):'';
  const block=document.getElementById('dates-block');if(block){block.style.pointerEvents='none';block.style.opacity='0.6';}
  addUserMsg(st.dates[0]+(st.dates[1]?' · '+st.dates[1]:'')+(st.dates[2]?' · '+st.dates[2]:''));
  setTimeout(()=>stepResumo(),400);
}

function v(id){const el=document.getElementById(id);return el?el.value.trim():'';}

function stepResumo(){
  setProgress(92,'Etapa 4 de 4 \u2014 Confirmacao');
  sendMessages([{html:'Tudo certo, <strong>'+esc(st.nome)+'</strong>! Confirme seu agendamento abaixo:',delay:0}],()=>{
    clearAnswerArea();hideAnswerArea();
    addInlineBlock(el=>{
      const card=document.createElement('div');card.className='conv-summary-card';
      let rows='<div class="conv-summary-row"><div class="conv-summary-label">Nome</div><div class="conv-summary-value">'+esc(st.nome)+'</div></div>';
      st.bookings.forEach(b=>{
        const svcLines=Object.values(b.services).map(s=>esc(s.name)+'<span style="color:rgba(255,255,255,0.45);font-size:11px"> \u2014 '+esc(s.time)+'</span>').join('<br>');
        rows+='<div class="conv-summary-row"><div class="conv-summary-label">'+esc(b.categoryLabel)+'</div><div class="conv-summary-value"><span style="font-size:11px;color:rgba(255,255,255,0.5);letter-spacing:0.1em;text-transform:uppercase">'+esc(b.profLabel)+'</span><br>'+svcLines+'</div></div>';
      });
      let datesVal=st.dates[0];if(st.dates[1])datesVal+='<br>'+st.dates[1];if(st.dates[2])datesVal+='<br>'+st.dates[2];
      rows+='<div class="conv-summary-row"><div class="conv-summary-label">Datas</div><div class="conv-summary-value">'+datesVal+'</div></div>';
      card.innerHTML=rows;el.appendChild(card);
      const wa=document.createElement('button');wa.className='conv-wa-btn';
      wa.innerHTML='<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326zM7.994 14.521a6.573 6.573 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.557 6.557 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592zm3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.729.729 0 0 0-.529.247c-.182.198-.691.677-.691 1.654 0 .977.71 1.916.81 2.049.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232z" fill="#FFFFFF"/></svg> Confirmar pelo WhatsApp';
      wa.onclick=sendWhatsApp;
      const edit=document.createElement('button');edit.className='conv-action-btn ghost';edit.textContent='Voltar e editar';
      edit.onclick=()=>{el.style.display='none';stepDatas();};
      el.appendChild(wa);el.appendChild(edit);setProgress(100,'Pronto!');
    },true);
  });
}

function sendWhatsApp(){
  let msg='Ola! Gostaria de agendar um atendimento no Studio Belle \uD83D\uDC9B\n\n';
  msg+='\uD83D\uDC64 *Nome:* '+st.nome+'\n\n';
  st.bookings.forEach(b=>{
    msg+='\u2728 *'+b.categoryLabel+'*\n';
    msg+='   Profissional: '+b.profLabel+'\n';
    Object.values(b.services).forEach(s=>{msg+='   \u2022 '+s.name+' ('+s.time+')\n';});
    msg+='\n';
  });
  msg+='\uD83D\uDCC5 *Disponibilidade:*\n   1a opcao: '+st.dates[0];
  if(st.dates[1])msg+='\n   2a opcao: '+st.dates[1];
  if(st.dates[2])msg+='\n   3a opcao: '+st.dates[2];
  window.open('https://wa.me/'+WHATSAPP+'?text='+encodeURIComponent(msg),'_blank');
  showToast('Abrindo WhatsApp...');
}

let calYear,calMonth,activeDateN;
function openDatePicker(n){
  activeDateN=n;document.getElementById('date-picker-title').textContent=n+'a opcao \u2014 escolha a data';
  const now=new Date();const existing=v('d'+n);
  if(existing){const p=existing.split('/');if(p.length===3){calYear=parseInt(p[2]);calMonth=parseInt(p[1])-1;}else{calYear=now.getFullYear();calMonth=now.getMonth();}}
  else{calYear=now.getFullYear();calMonth=now.getMonth();}
  renderCal();openPicker('date-picker-overlay');
}
function renderCal(){
  document.getElementById('cal-month-label').textContent=MONTHS_PT[calMonth]+' '+calYear;
  const dowRow=document.getElementById('cal-dow-row');dowRow.innerHTML='';
  DOWS.forEach(d=>{const el=document.createElement('div');el.className='cal-dow';el.textContent=d;dowRow.appendChild(el);});
  const days=document.getElementById('cal-days');days.innerHTML='';
  const firstDay=new Date(calYear,calMonth,1).getDay();const total=new Date(calYear,calMonth+1,0).getDate();
  const today=new Date();today.setHours(0,0,0,0);const curVal=v('d'+activeDateN);
  for(let i=0;i<firstDay;i++){const e=document.createElement('div');e.className='cal-day cal-day--empty';days.appendChild(e);}
  for(let d=1;d<=total;d++){
    const date=new Date(calYear,calMonth,d);date.setHours(0,0,0,0);
    const disabled=date.getDay()===0||date<today;const isToday=date.getTime()===today.getTime();
    const fmt=pad(d)+'/'+pad(calMonth+1)+'/'+calYear;const isSelected=fmt===curVal;
    const el=document.createElement('div');
    el.className='cal-day'+(disabled?' cal-day--disabled':'')+(isToday?' cal-day--today':'')+(isSelected?' cal-day--selected':'');
    el.textContent=d;
    if(!disabled)el.onclick=()=>{document.getElementById('d'+activeDateN).value=pad(d)+'/'+pad(calMonth+1)+'/'+calYear;closePicker('date-picker-overlay');};
    days.appendChild(el);
  }
}
function calPrev(){calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderCal();}
function calNext(){calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCal();}

let activeTimeN;
function openTimePicker(n){
  activeTimeN=n;document.getElementById('time-picker-title').textContent=n+'a opcao \u2014 escolha o horario';
  const grid=document.getElementById('time-grid');grid.innerHTML='';const curVal=v('t'+n);
  for(let h=8;h<=19;h++){const mins=h===19?[0]:[0,30];mins.forEach(m=>{const label=pad(h)+':'+pad(m);const el=document.createElement('div');el.className='time-slot'+(curVal===label?' selected':'');el.textContent=label;el.onclick=()=>{document.getElementById('t'+activeTimeN).value=label;closePicker('time-picker-overlay');};grid.appendChild(el);});}
  openPicker('time-picker-overlay');
}

function openPicker(id){const el=document.getElementById(id);el.style.display='flex';requestAnimationFrame(()=>requestAnimationFrame(()=>el.classList.add('open')));}
function closePicker(id){const el=document.getElementById(id);el.classList.remove('open');setTimeout(()=>{el.style.display='';},320);}
function handlePickerOverlay(e,id){if(e.target===document.getElementById(id))closePicker(id);}

const toastEl=document.getElementById('toast');let toastT;
function showToast(msg){toastEl.textContent=msg;toastEl.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>toastEl.classList.remove('show'),2400);}
function esc(str){if(!str)return'';return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function pad(n){return String(n).padStart(2,'0');}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closePicker('date-picker-overlay');closePicker('time-picker-overlay');}});
</script>
