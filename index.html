<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Studio Belle — Agendamento</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>

/* ═══════════════════════════════════════════════════════════
   RESET & TOKENS
═══════════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }

:root {
  --primary:       #0077AA;
  --primary-deep:  #004F7A;
  --primary-glow:  #00A8D8;
  --bg:            #002040;
  --bg-mid:        #003D6B;
  --accent:        #3DBAFF;
  --accent-warm:   #66D4FF;

  --green-ui:      #1a7a3c;
  --green-dk:      #145e2e;
  --yellow-hl:     #f5c800;
  --yellow-dk:     #d4ac00;

  --white:         #ffffff;
  --off-white:     #E0F7FF;
  --ink:           #0d1117;
  --ink-mid:       #3a4050;
  --ink-soft:      #5a6070;
  --hair:          rgba(224,247,255,0.15);
  --hair-solid:    rgba(224,247,255,0.08);

  --display:   'Plus Jakarta Sans', system-ui, sans-serif;
  --serif:     'Cormorant Garamond', Georgia, serif;
  --body:      'DM Sans', system-ui, sans-serif;
  --mono:      'JetBrains Mono', ui-monospace, monospace;

  --r-sm: 8px;
  --r-md: 14px;
  --r-lg: 20px;
  --r-xl: 28px;

  /* Variáveis de proporção do logo/bridge — ORIGINAIS */
  --logo-size:        132px;
  --logo-half:        66px;
  --arc-depth:        20px;
  --arc-top-offset:   46px;
}

body {
  font-family: var(--body);
  background: var(--bg);
  color: var(--off-white);
  font-size: 16px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  min-height: 100dvh;
  overflow-x: hidden;
}

::selection { background: var(--accent); color: var(--bg); }

/* ═══════════════════════════════════════════════════════════
   HOME SCREEN — ARQUITETURA VISUAL ORIGINAL RESTAURADA
═══════════════════════════════════════════════════════════ */
#screen-home {
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}

/* Fundo decorativo — idêntico ao original */
#screen-home::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 60% 20%, rgba(0,168,216,0.22) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 10% 80%, rgba(0,119,170,0.30) 0%, transparent 55%),
    linear-gradient(175deg, #001830 0%, #002040 35%, #003D6B 65%, #001830 100%);
  z-index: 0;
}

.home-inner {
  position: relative; z-index: 1;
  max-width: 520px; margin: 0 auto;
  padding: 0 20px;
  flex: 1; display: flex; flex-direction: column;
}

/* ── COVER — clip-path referencia o SVG oculto com coordenadas absolutas ── */
.home-cover {
  position: relative;
  height: 205px;
  margin: 0 -20px;
  flex-shrink: 0;
  clip-path: url(#homeClip);
  overflow: hidden;
}
.home-cover-img {
  position: absolute; inset: 0;
  background-image: url('https://images.unsplash.com/photo-1522337360788-8b13dee7a37e?w=1200&q=80');
  background-size: cover; background-position: center 30%;
  opacity: 0.88;
}
.home-cover-vignette {
  position: absolute; inset: 0;
  background: linear-gradient(to bottom,
    rgba(0,20,40,0.15) 0%,
    rgba(0,13,26,0.06) 40%,
    rgba(0,10,20,0.55) 100%);
  pointer-events: none;
}

/* Profile junction — espaço onde o logo emerge + bridge-svg */
.home-logo-wrap {
  position: relative;
  height: var(--logo-size);
  margin-top: calc(-1 * var(--logo-half));
  flex-shrink: 0; z-index: 2;
}

/* Bridge SVG — a ponte curva animada */
.home-bridge-svg {
  position: absolute;
  top: var(--arc-top-offset);
  left: -20px;
  width: calc(100% + 40px);
  height: var(--arc-depth);
  display: block; overflow: visible;
}

.bridge-base {
  fill: none;
  stroke: rgba(0,119,170,0.45);
  stroke-width: 0.9;
  vector-effect: non-scaling-stroke;
}

.bridge-shine-l,
.bridge-shine-r {
  fill: none;
  stroke: rgba(61,186,255,0.82);
  stroke-width: 1.5;
  stroke-linecap: round;
  stroke-dasharray: 28 300;
  stroke-dashoffset: 328;
  vector-effect: non-scaling-stroke;
}
.bridge-shine-l { animation: bridge-shimmer-l 5s ease-in-out infinite; }
.bridge-shine-r { animation: bridge-shimmer-r 5s ease-in-out infinite; }

@keyframes bridge-shimmer-l {
  0%,5%    { stroke-dashoffset: 328;  opacity: 0; }
  11%      { opacity: 1; }
  64%      { opacity: 0.86; stroke-dashoffset: -28; }
  74%,100% { stroke-dashoffset: -28;  opacity: 0; }
}
@keyframes bridge-shimmer-r {
  0%,5%    { stroke-dashoffset: -328; opacity: 0; }
  11%      { opacity: 1; }
  64%      { opacity: 0.86; stroke-dashoffset: 28; }
  74%,100% { stroke-dashoffset: 28;   opacity: 0; }
}

/* Logo circle */
.home-logo-circle {
  position: absolute;
  top: 0; left: 50%; transform: translateX(-50%);
  width: var(--logo-size); height: var(--logo-size); border-radius: 50%;
  background: radial-gradient(circle at 38% 34%, #004F7A 0%, #002040 52%, #000D1A 100%);
  border: 2.5px solid rgba(0,119,170,0.65);
  box-shadow:
    0 0 0 1.5px rgba(0,13,26,0.92),
    0 8px 36px rgba(0,20,40,0.72),
    0 0 32px rgba(0,119,170,0.16),
    inset 0 1px 0 rgba(224,247,255,0.12),
    inset 0 -1px 0 rgba(0,5,10,0.30);
  display: flex; align-items: center; justify-content: center; z-index: 3;
}
.home-logo-circle::after {
  content: '';
  position: absolute; inset: -1px; border-radius: 50%;
  background: radial-gradient(circle at 38% 22%, rgba(224,247,255,0.13) 0%, transparent 58%);
  pointer-events: none;
}

/* Identidade */
.home-identity {
  text-align: center;
  padding: 16px 0 12px;
}
.home-studio-name {
  font-family: var(--serif);
  font-size: 30px; font-weight: 600; font-style: italic;
  color: var(--off-white); letter-spacing: 0.04em; line-height: 1;
  margin-bottom: 8px;
}
.home-tagline {
  font-size: 14px; font-weight: 400;
  line-height: 1.6; color: rgba(224,247,255,0.75); letter-spacing: 0.01em;
}
.home-tagline em { font-style: normal; color: var(--accent); font-weight: 500; }

/* Divisor */
.home-divider {
  display: flex; align-items: center; gap: 14px;
  margin: 20px 0;
}
.home-divider-line {
  flex: 1; height: 1px;
  background: linear-gradient(90deg, rgba(0,119,170,0.6), rgba(0,61,107,0.2));
}
.home-divider-gem {
  width: 5px; height: 5px; background: var(--accent);
  transform: rotate(45deg); opacity: 0.7;
  animation: gem-pulse 5s ease-in-out infinite;
}
@keyframes gem-pulse {
  0%,52%  { opacity:0.7; transform:rotate(45deg) scale(1); }
  65%     { opacity:1; transform:rotate(45deg) scale(1.45); filter:brightness(1.5); }
  78%     { opacity:0.88; transform:rotate(45deg) scale(1.10); filter:brightness(1.15); }
  92%,100%{ opacity:0.7; transform:rotate(45deg) scale(1); filter:brightness(1); }
}

/* Botões home */
.home-actions { display: flex; flex-direction: column; gap: 12px; padding-bottom: 32px; }

.home-btn-primary {
  position: relative; display: flex; align-items: center; gap: 16px;
  padding: 0 20px; height: 72px;
  background: linear-gradient(180deg, #0077AA 0%, #004F7A 52%, #003D6B 100%);
  border: 1px solid rgba(224,247,255,0.25); border-radius: 4px;
  cursor: pointer; overflow: hidden; text-align: left;
  transition: transform 80ms, box-shadow 120ms;
  box-shadow: 0 2px 18px rgba(0,119,170,0.40), inset 0 1px 0 rgba(224,247,255,0.18);
  -webkit-tap-highlight-color: transparent;
}
.home-btn-primary::after {
  content: ''; position: absolute; top: 0; left: -90%; width: 55%; height: 100%;
  background: linear-gradient(102deg, transparent 0%, rgba(224,247,255,0.10) 30%, rgba(224,247,255,0.24) 50%, rgba(224,247,255,0.10) 70%, transparent 100%);
  transform: skewX(-10deg); animation: shimmer-slide 7s cubic-bezier(0.4,0,0.6,1) infinite;
  pointer-events: none;
}
@keyframes shimmer-slide { 0%,22%{left:-90%;} 72%,100%{left:180%;} }
.home-btn-primary:active { transform: scale(0.976); }
.home-btn-icon {
  width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0;
  background: linear-gradient(135deg, rgba(0,168,216,0.18), rgba(0,79,122,0.30));
  border: 1.5px solid rgba(224,247,255,0.28);
  display: flex; align-items: center; justify-content: center;
}
.home-btn-info { flex: 1; }
.home-btn-role { font-family: var(--mono); font-size: 9.5px; font-weight: 600; letter-spacing: 0.22em; text-transform: uppercase; color: var(--accent); margin-bottom: 3px; }
.home-btn-name { font-family: var(--serif); font-size: 22px; font-weight: 600; color: #fff; letter-spacing: 0.01em; line-height: 1; margin-bottom: 2px; }
.home-btn-sub  { font-size: 11px; font-weight: 500; color: rgba(224,247,255,0.6); letter-spacing: 0.03em; }
.home-btn-arrow { flex-shrink: 0; opacity: 0.55; transition: opacity 200ms, transform 200ms; }
.home-btn-primary:hover .home-btn-arrow { opacity: 0.9; transform: translateX(2px); }

.home-btn-insta {
  position: relative; display: flex; align-items: center; gap: 14px; padding: 0 20px;
  height: 56px; background: linear-gradient(135deg, #833AB4 0%, #C13584 45%, #E1306C 75%, #F77737 100%);
  border: none; border-radius: 4px; cursor: pointer; overflow: hidden;
  text-decoration: none; text-align: left;
  transition: transform 80ms; -webkit-tap-highlight-color: transparent;
  box-shadow: 0 2px 16px rgba(193,53,132,0.35);
}
.home-btn-insta:active { transform: scale(0.976); }
.home-btn-insta-label { flex: 1; }
.home-btn-insta-role { font-family: var(--mono); font-size: 9.5px; font-weight: 600; letter-spacing: 0.22em; text-transform: uppercase; color: rgba(255,240,250,0.80); margin-bottom: 2px; }
.home-btn-insta-name { font-size: 14px; font-weight: 500; color: rgba(255,240,250,0.95); letter-spacing: 0.04em; }

.home-footer { text-align: center; padding: 0 0 20px; opacity: 0.35; }
.home-footer-text { font-family: var(--mono); font-size: 10px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); }

/* ═══════════════════════════════════════════════════════════
   CONV SCREEN — estilo WhatsApp
═══════════════════════════════════════════════════════════ */
#screen-conv {
  position: fixed; inset: 0; z-index: 200;
  display: flex; flex-direction: column;
  background: #0a0f1a;
  transform: translateY(100%);
  transition: transform 400ms cubic-bezier(0.25,0.46,0.45,0.94);
  overflow: hidden;
}
#screen-conv.visible { transform: translateY(0); }

.conv-masthead {
  position: relative; flex-shrink: 0; z-index: 10;
  background: rgba(0,15,30,0.98);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(255,255,255,0.07);
}
.conv-masthead-inner {
  max-width: 800px; margin: 0 auto; padding: 0 20px;
  height: 58px; display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
.conv-brand { display: flex; align-items: center; gap: 10px; cursor: pointer; }
.conv-brand-logo {
  width: 32px; height: 32px; border-radius: 50%;
  background: radial-gradient(circle at 38% 34%, #004F7A 0%, #001830 70%);
  border: 1.5px solid rgba(0,119,170,0.65);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--serif); font-size: 15px; font-weight: 600; font-style: italic;
  color: var(--off-white);
}
.conv-brand-name { font-family: var(--serif); font-size: 17px; font-weight: 600; font-style: italic; color: var(--off-white); letter-spacing: 0.02em; line-height: 1; }
.conv-brand-status { font-family: var(--mono); font-size: 10px; font-weight: 500; color: rgba(61,186,255,0.7); letter-spacing: 0.06em; }
.conv-progress-area { display: flex; align-items: center; gap: 10px; }
.conv-step-label { font-family: var(--mono); font-size: 10px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: rgba(255,255,255,0.3); }
.conv-progress-bar { width: 100px; height: 2px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
.conv-progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.5s cubic-bezier(.4,0,.2,1); }

.conv-scroll { flex: 1 1 0; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; scroll-behavior: smooth; }
.conv-stage { max-width: 800px; margin: 0 auto; padding: 28px 20px 20px; display: flex; flex-direction: column; min-height: 100%; }

.conv-msg {
  display: flex; align-items: flex-start; gap: 10px;
  margin-bottom: 16px;
  animation: msgIn 0.38s cubic-bezier(.2,.7,.2,1) both;
}
@keyframes msgIn {
  from { opacity:0; transform:translateY(10px); }
  to   { opacity:1; transform:translateY(0); }
}
.conv-avatar {
  width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
  background: radial-gradient(circle at 38% 34%, #004F7A 0%, #001830 70%);
  border: 1.5px solid rgba(0,119,170,0.65);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--serif); font-size: 14px; font-weight: 600; font-style: italic;
  color: var(--off-white); margin-top: 2px;
}
.conv-bubble {
  max-width: 72ch; padding: 12px 16px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: 4px 16px 16px 16px;
  font-size: 15px; line-height: 1.6; color: rgba(255,255,255,0.88); font-weight: 400;
}
.conv-bubble strong { color: #fff; font-weight: 700; }
.conv-bubble em { font-style: italic; color: var(--accent-warm); }
.conv-bubble.insight {
  background: rgba(0,119,170,0.12);
  border-color: rgba(61,186,255,0.22);
  font-size: 14px;
}
.conv-bubble.insight::before {
  content: '';
  display: inline-block; width: 5px; height: 5px;
  border-radius: 50%; background: var(--accent);
  margin-right: 7px; vertical-align: middle;
  box-shadow: 0 0 0 3px rgba(61,186,255,0.18);
}

.conv-typing {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 12px; animation: msgIn 0.3s ease both;
}
.conv-typing-dots {
  display: flex; gap: 4px; align-items: center;
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.09);
  padding: 10px 14px; border-radius: 16px;
}
.conv-typing-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: rgba(255,255,255,0.3);
  animation: dotPulse 1.2s ease-in-out infinite;
}
.conv-typing-dot:nth-child(2) { animation-delay: 0.2s; }
.conv-typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes dotPulse {
  0%,80%,100%{ transform:scale(0.8); opacity:0.4; }
  40%        { transform:scale(1.1); opacity:1; }
}

.conv-user-msg {
  display: flex; justify-content: flex-end;
  margin-bottom: 16px; animation: msgIn 0.3s ease both;
}
.conv-user-bubble {
  max-width: 72ch; padding: 11px 16px;
  background: var(--primary);
  border-radius: 16px 4px 16px 16px;
  font-size: 14px; line-height: 1.55; color: #fff; font-weight: 500;
}

.conv-answer-area {
  position: sticky; bottom: 0; flex-shrink: 0; z-index: 50;
  background: rgba(10,15,26,0.98);
  backdrop-filter: blur(20px);
  border-top: 1px solid rgba(255,255,255,0.07);
  padding: 12px 20px calc(14px + env(safe-area-inset-bottom, 0px));
  animation: slideUp 0.35s cubic-bezier(.2,.7,.2,1) both;
  transition: opacity 0.2s ease;
}
@keyframes slideUp {
  from { transform:translateY(100%); opacity:0; }
  to   { transform:translateY(0); opacity:1; }
}
.conv-answer-inner { max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 10px; }
.conv-answer-hint {
  font-family: var(--mono); font-size: 10px; font-weight: 600;
  letter-spacing: 0.07em; text-transform: uppercase; color: rgba(255,255,255,0.28);
}

.conv-options { display: flex; flex-wrap: wrap; gap: 8px; }
.conv-option {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 9px 16px;
  background: rgba(255,255,255,0.06);
  border: 1.5px solid rgba(255,255,255,0.12);
  border-radius: 100px;
  font-size: 13.5px; font-weight: 500; color: rgba(255,255,255,0.8);
  cursor: pointer; transition: all 0.18s; letter-spacing: -0.005em;
  -webkit-tap-highlight-color: transparent;
}
.conv-option:hover { background: rgba(0,119,170,0.18); border-color: rgba(61,186,255,0.45); color: var(--accent); }
.conv-option:active { transform: scale(0.96); }
.conv-option.selected {
  background: rgba(0,119,170,0.25);
  border-color: rgba(61,186,255,0.7);
  color: var(--accent);
  font-weight: 600;
}
.conv-option.selected::before { content: '✓ '; }

.conv-continue-btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 11px 22px;
  background: linear-gradient(105deg, #002040 0%, #0077AA 30%, #3DBAFF 52%, #0077AA 72%, #002040 100%);
  background-size: 250% 100%; background-position: 100% 0;
  border: 1px solid rgba(224,247,255,0.28); border-radius: 8px;
  font-family: var(--body); font-size: 13.5px; font-weight: 700;
  color: #fff; cursor: pointer;
  transition: background-position 0.5s ease, transform 0.12s, opacity 0.2s;
  box-shadow: 0 4px 14px rgba(0,119,170,0.4);
  opacity: 0; pointer-events: none; transform: translateY(4px);
  letter-spacing: -0.01em;
}
.conv-continue-btn.visible {
  opacity: 1; pointer-events: auto; transform: translateY(0);
  transition: background-position 0.5s ease, transform 0.2s cubic-bezier(.2,.7,.2,1), opacity 0.2s;
}
.conv-continue-btn:hover { background-position: 0% 0; }
.conv-continue-btn:active { transform: scale(0.97); }

.conv-options-row { display: flex; flex-direction: column; gap: 10px; }
.conv-options-footer { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }

.conv-timer-bar { display: flex; align-items: center; gap: 8px; }
.conv-timer-track { flex: 1; height: 2px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
.conv-timer-fill { height: 100%; background: rgba(61,186,255,0.5); border-radius: 2px; transition: width 1s linear; }
.conv-timer-label { font-family: var(--mono); font-size: 10px; font-weight: 600; letter-spacing: 0.06em; color: rgba(255,255,255,0.28); white-space: nowrap; flex-shrink: 0; transition: color 0.3s; }
.conv-timer-label.ending { color: rgba(61,186,255,0.65); }

.conv-input-row { display: flex; gap: 10px; align-items: flex-end; }
.conv-text-input {
  flex: 1; padding: 12px 16px;
  background: rgba(255,255,255,0.06);
  border: 1.5px solid rgba(255,255,255,0.12);
  border-radius: 10px; color: #fff;
  font-family: var(--body); font-size: 15px; font-weight: 400;
  outline: none; transition: border-color 0.18s, background 0.18s;
  resize: none; line-height: 1.5;
}
.conv-text-input::placeholder { color: rgba(255,255,255,0.25); }
.conv-text-input:focus { border-color: rgba(61,186,255,0.55); background: rgba(255,255,255,0.08); }
.conv-send-btn {
  width: 44px; height: 44px; border-radius: 10px;
  background: var(--primary); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: background 0.15s, transform 0.12s;
  box-shadow: 0 4px 12px rgba(0,119,170,0.4);
}
.conv-send-btn:hover { background: var(--primary-glow); }
.conv-send-btn:active { transform: scale(0.93); }
.conv-send-btn svg { width: 17px; height: 17px; color: #fff; }

/* ═══════════════════════════════════════════════════════════
   ACORDEÃO — categorias de serviço
═══════════════════════════════════════════════════════════ */
.svc-category-list { display: flex; flex-direction: column; gap: 8px; }
.svc-category-item {
  background: rgba(255,255,255,0.05);
  border: 1.5px solid rgba(255,255,255,0.1);
  border-radius: var(--r-md);
  overflow: hidden; transition: border-color 0.2s;
}
.svc-category-item.open { border-color: rgba(61,186,255,0.35); }
.svc-category-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px; cursor: pointer; gap: 10px;
  -webkit-tap-highlight-color: transparent; transition: background 0.18s;
}
.svc-category-header:hover { background: rgba(255,255,255,0.04); }

.svc-sub-list { padding: 0 10px 10px; display: flex; flex-direction: column; gap: 5px; }

}
.svc-sub-item-left { display: flex; flex-direction: column; gap: 2px; flex: 1; }

.svc-sub-check {

}
.svc-sub-item.selected .svc-sub-check { background: var(--primary); border-color: var(--accent); }

.svc-sub-item.selected .svc-sub-check svg { display: block; }

.svc-selection-bar {

.svc-selection-bar-label {

.svc-chips { display: flex; flex-wrap: wrap; gap: 5px; }

/* ═══════════════════════════════════════════════════════════
   PICKER — DATA / HORA
═══════════════════════════════════════════════════════════ */
.picker-overlay {
  position: fixed; inset: 0; z-index: 500;
  display: flex; align-items: flex-end; justify-content: center;
  background: rgba(0,5,10,0); pointer-events: none;
  transition: background 250ms ease;
}
.picker-overlay.open { background: rgba(0,5,10,0.85); pointer-events: auto; }
.picker-panel {
  background: linear-gradient(170deg, #001830 0%, #003D6B 100%);
  border: 1px solid rgba(0,119,170,0.4);
  border-radius: 16px 16px 0 0; padding: 0 0 32px;
  width: 100%; max-width: 600px;
  transform: translateY(100%); transition: transform 320ms cubic-bezier(0.25,0.46,0.45,0.94);
  max-height: 80dvh; overflow-y: auto;
}
.picker-overlay.open .picker-panel { transform: translateY(0); }
.picker-drag { display: flex; justify-content: center; padding: 12px 0 0; }
.picker-drag span { width: 36px; height: 3px; background: rgba(0,119,170,0.35); border-radius: 2px; display: block; }
.picker-title {
  font-family: var(--mono); font-size: 10.5px; font-weight: 600;
  letter-spacing: 0.18em; text-transform: uppercase; color: rgba(255,255,255,0.8);
  text-align: center; padding: 12px 20px 14px;
  border-bottom: 1px solid rgba(0,119,170,0.18);
}

.cal-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px 8px; }
.cal-month { font-family: var(--serif); font-size: 20px; font-weight: 600; font-style: italic; color: var(--off-white); letter-spacing: 0.03em; }
.cal-nav-btn {
  background: none; border: none; cursor: pointer; color: rgba(224,247,255,0.7);
  padding: 6px; border-radius: 4px; transition: color 150ms, background 150ms;
  display: flex; align-items: center; justify-content: center; min-width: 36px; min-height: 36px;
  -webkit-tap-highlight-color: transparent;
}
.cal-nav-btn:hover { color: #fff; background: rgba(0,119,170,0.2); }
.cal-grid { padding: 0 12px 8px; }
.cal-dow-row { display: grid; grid-template-columns: repeat(7,1fr); margin-bottom: 4px; }
.cal-dow { font-family: var(--mono); font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(224,247,255,0.5); text-align: center; padding: 4px 0; }
.cal-days { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; }
.cal-day {
  aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
  border-radius: 50%; font-family: var(--body); font-size: 14px; font-weight: 500;
  color: #fff; cursor: pointer; transition: background 150ms, color 150ms;
  min-height: 40px; -webkit-tap-highlight-color: transparent;
}
.cal-day:hover:not(.cal-day--disabled):not(.cal-day--empty) { background: rgba(0,119,170,0.28); }
.cal-day--disabled { color: rgba(224,247,255,0.2); cursor: not-allowed; }
.cal-day--empty { pointer-events: none; }
.cal-day--today { border: 1.5px solid rgba(0,119,170,0.55); }
.cal-day--selected { background: var(--primary) !important; color: #fff !important; font-weight: 700; }

.time-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; padding: 12px 16px 4px; }
.time-slot {
  display: flex; align-items: center; justify-content: center;
  padding: 11px 0; border-radius: 6px;
  font-family: var(--body); font-size: 14px; font-weight: 500; color: #fff;
  background: rgba(0,79,122,0.18); border: 1.5px solid rgba(224,247,255,0.18);
  cursor: pointer; transition: background 150ms, border-color 150ms;
  -webkit-tap-highlight-color: transparent; min-height: 44px;
}
.time-slot:hover { background: rgba(0,79,122,0.38); border-color: rgba(224,247,255,0.45); }
.time-slot.selected { background: var(--primary); border-color: var(--accent); color: #fff; font-weight: 700; }

/* ═══════════════════════════════════════════════════════════
   CONCLUSÃO / RESUMO
═══════════════════════════════════════════════════════════ */
.conv-summary-card {
  background: rgba(0,79,122,0.12); border: 1.5px solid rgba(0,119,170,0.28);
  border-radius: var(--r-md); overflow: hidden; margin-bottom: 16px;
}

}
.conv-summary-row:last-child { border-bottom: none; }
.conv-summary-label {

}

.conv-dates-section { display: flex; flex-direction: column; gap: 12px; margin-bottom: 14px; }
.conv-date-row { display: flex; flex-direction: column; gap: 6px; }
.conv-date-label {
  font-family: var(--mono); font-size: 10px; font-weight: 600;
  letter-spacing: 0.15em; text-transform: uppercase; color: rgba(255,255,255,0.6);
}
.conv-date-label .req { color: var(--accent); }
.conv-date-label .opt { color: rgba(255,255,255,0.3); font-weight: 500; }
.conv-date-inputs { display: flex; gap: 8px; }
.conv-date-input, .conv-time-input {
  flex: 1; padding: 11px 14px;

}
.conv-date-input::placeholder, .conv-time-input::placeholder { color: rgba(255,255,255,0.25); }
.conv-date-input:focus, .conv-time-input:focus { border-color: rgba(61,186,255,0.55); }
.conv-date-input.field-error { border-color: rgba(220,50,70,0.8); }
.conv-date-error { font-family: var(--mono); font-size: 11px; font-weight: 600; color: #FF5060; min-height: 14px; }

.conv-form-hint { font-size: 13px; line-height: 1.6; color: rgba(255,255,255,0.5); margin-bottom: 12px; }
.conv-form-hint .hl { color: var(--accent); font-weight: 600; }

.conv-action-btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 9px;
  padding: 13px 22px; width: 100%;
  background: linear-gradient(105deg, #002040 0%, #0077AA 30%, #3DBAFF 52%, #0077AA 72%, #002040 100%);
  background-size: 250% 100%; background-position: 100% 0;
  border: 1px solid rgba(224,247,255,0.25); border-radius: 8px;
  font-family: var(--body); font-size: 14px; font-weight: 700;
  color: #fff; cursor: pointer; margin-top: 12px;
  transition: background-position 0.5s ease, transform 0.12s, box-shadow 0.18s;
  box-shadow: 0 4px 16px rgba(0,119,170,0.38); letter-spacing: -0.01em;
  -webkit-tap-highlight-color: transparent;
}
.conv-action-btn:hover { background-position: 0% 0; box-shadow: 0 4px 24px rgba(0,168,216,0.55); }
.conv-action-btn:active { transform: scale(0.98); }
.conv-action-btn.ghost {
  background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.12);
  box-shadow: none; color: rgba(255,255,255,0.6); font-weight: 600;
  margin-top: 6px;
}
.conv-action-btn.ghost:hover { background: rgba(255,255,255,0.1); color: #fff; }

.conv-wa-btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 10px;
  padding: 14px 24px; width: 100%; background: #25d366; color: #fff;
  font-family: var(--body); font-size: 14px; font-weight: 700;
  border: none; border-radius: 8px; cursor: pointer; margin-top: 12px;
  transition: background 0.15s, transform 0.12s;
  box-shadow: 0 4px 16px rgba(37,211,102,0.35); letter-spacing: -0.01em;
  -webkit-tap-highlight-color: transparent;
}
.conv-wa-btn:hover { background: #1eb558; }
.conv-wa-btn:active { transform: scale(0.98); }

.prof-cards { display: flex; flex-direction: column; gap: 8px; }
.prof-card {
  display: flex; align-items: center; gap: 12px; padding: 12px 16px;
  background: rgba(0,79,122,0.15); border: 1.5px solid rgba(224,247,255,0.15);
  border-radius: var(--r-md); cursor: pointer;
  transition: all 0.2s; -webkit-tap-highlight-color: transparent;
}
.prof-card:hover { background: rgba(0,79,122,0.28); border-color: rgba(224,247,255,0.35); }
.prof-card.selected { background: rgba(0,119,170,0.25); border-color: rgba(61,186,255,0.55); }
.prof-avatar {
  width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
  background: linear-gradient(135deg, rgba(0,168,216,0.25), rgba(0,79,122,0.4));
  border: 1.5px solid rgba(224,247,255,0.22);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--serif); font-size: 15px; font-weight: 600; font-style: italic; color: rgba(224,247,255,0.85);
}
.prof-name { font-size: 15px; font-weight: 600; color: #fff; flex: 1; }

.conv-inline-block { margin-top: 4px; margin-bottom: 20px; animation: msgIn 0.38s cubic-bezier(.2,.7,.2,1) both; }
.conv-inline-block.indent { padding-left: 42px; }

/* Toast */
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px); background: #0d1117; color: #fff; padding: 11px 18px; border-radius: 9px; font-size: 13px; font-weight: 600; z-index: 999; opacity: 0; pointer-events: none; transition: opacity 0.22s, transform 0.28s cubic-bezier(.2,.7,.2,1); white-space: nowrap; box-shadow: 0 8px 24px rgba(10,14,26,0.25); display: flex; align-items: center; gap: 7px; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(61,186,255,0.18); border-radius: 2px; }

@media (max-width: 480px) {
  .time-grid { grid-template-columns: repeat(3,1fr); }
  .conv-stage { padding: 20px 16px 16px; }
  .conv-answer-area { padding: 10px 16px calc(12px + env(safe-area-inset-bottom,0px)); }
  .conv-option { font-size: 13px; padding: 8px 13px; }
}

</style>

<!--
  SVG oculto com o clipPath da cover — SISTEMA ORIGINAL:
  userSpaceOnUse implícito + coordenadas em pixels absolutos da viewport.
  O path Q-bezier recria a curva orgânica exata da referência.
  Posicionado fora do fluxo para não ocupar espaço.
-->
<svg width="0" height="0" style="position:absolute;overflow:hidden;pointer-events:none" aria-hidden="true">
  <defs>
    <!--
      homeClip: clipPath em coordenadas de tela (userSpaceOnUse padrão).
      Aplicado ao .home-cover que tem margin: 0 -20px, então
      a largura efetiva é viewport + 40px.
      A curva Q cria a onda descendente que a ponte/bridge acompanha.
      Valores espelham exatamente a versão de referência.
    -->
    <clipPath id="homeClip">
      <path d="M 0 0 L 9999 0 L 9999 9999 Q 50% 185px 0 9999 Z"/>
    </clipPath>
  </defs>
</svg>

   CLIP PATH DINÂMICO — restaura a curva original
   O clipPath #homeClip precisa de coordenadas em px
   que acompanham a largura real do .home-cover.
   Aqui recalculamos o path para qualquer viewport.
════════════════════════════════════════════════════ */
function updateHomeClip() {
  const cover = document.querySelector('.home-cover');
  if (!cover) return;
  const rect = cover.getBoundingClientRect();
  const W = rect.width;
  const H = rect.height; // 205px
  // Curva Q que desce ao centro, criando a onda orgânica:
  // parte de (0, H-20) na esquerda, desce para (W/2, H+20) no meio,
  // sobe para (W, H-20) na direita — igual ao path original.
  const curveY = H - 18;   // ponto lateral da curva
  const midY   = H + 22;   // profundidade máxima do arco
  const pathD  = `M 0 0 L ${W} 0 L ${W} ${curveY} Q ${W/2} ${midY} 0 ${curveY} Z`;
  const clipPath = document.getElementById('homeClip');
  if (clipPath) clipPath.querySelector('path').setAttribute('d', pathD);
}

// Calcula na carga e no resize
window.addEventListener('load', updateHomeClip);
window.addEventListener('resize', updateHomeClip);

   SEQUÊNCIA DE MENSAGENS COM DELAYS
════════════════════════════════════════════════════ */
function sendMessages(msgs, onDone) {
  let t = 0;
  msgs.forEach((m, i) => {
    const delay = m.delay || 0;
    setTimeout(() => {
      if (i > 0) showTyping();
    }, delay);
    const msgDelay = delay + (i > 0 ? 850 : 0);
    t = msgDelay + 300;
    setTimeout(() => {
      addBotMsg(m.html, m.insight || false);
    }, msgDelay);
  });
  setTimeout(() => onDone && onDone(), t + 100);
}

/* ════════════════════════════════════════════════════
   CHIPS COM MULTI-SELECT + TIMER + CONTINUAR
════════════════════════════════════════════════════ */
function buildChipsArea(inner, {hint, options, timed, multi, onSubmit}) {
  const selectedVals = new Set();

  const hintEl = document.createElement('div');
  hintEl.className = 'conv-answer-hint';
  hintEl.textContent = hint || (multi ? 'Escolha uma ou mais opções' : 'Escolha uma opção');
  inner.appendChild(hintEl);

  const row = document.createElement('div');
  row.className = 'conv-options-row';
  inner.appendChild(row);

  const opts = document.createElement('div');
  opts.className = 'conv-options';
  row.appendChild(opts);

  const continueBtn = document.createElement('button');
  continueBtn.className = 'conv-continue-btn';
  continueBtn.innerHTML = `Continuar <svg viewBox="0 0 14 14" fill="none"><path d="M3 7h8M7.5 3.5L11 7l-3.5 3.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

  const footer = document.createElement('div');
  footer.className = 'conv-options-footer';
  row.appendChild(footer);

  function doSubmit() {
    if (selectedVals.size === 0) return;
    if (convTimerID) { clearInterval(convTimerID); convTimerID = null; }
    const vals = [...selectedVals];
    onSubmit(vals, vals.join(', '));
  }

  function updateContinue() {
    if (selectedVals.size > 0) {
      continueBtn.classList.add('visible');
      continueBtn.innerHTML = selectedVals.size > 1
        ? `${selectedVals.size} selecionados · Continuar <svg viewBox="0 0 14 14" fill="none"><path d="M3 7h8M7.5 3.5L11 7l-3.5 3.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`
        : `Continuar <svg viewBox="0 0 14 14" fill="none"><path d="M3 7h8M7.5 3.5L11 7l-3.5 3.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    } else {
      continueBtn.classList.remove('visible');
    }
  }
  continueBtn.onclick = doSubmit;

  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'conv-option';
    btn.textContent = typeof opt === 'string' ? opt : opt.label;
    const val = typeof opt === 'string' ? opt : opt.val;
    btn.onclick = () => {
      if (!multi) {
        if (convTimerID) { clearInterval(convTimerID); convTimerID = null; }
        onSubmit([val], val);
        return;
      }
      if (selectedVals.has(val)) {
        selectedVals.delete(val);
        btn.classList.remove('selected');
      } else {
        selectedVals.add(val);
        btn.classList.add('selected');
      }
      updateContinue();
    };
    opts.appendChild(btn);
  });

  if (timed) {
    let secs = 25;
    const timerBar = document.createElement('div');
    timerBar.className = 'conv-timer-bar';
    timerBar.style.flex = '1';
    timerBar.innerHTML = `<div class="conv-timer-track"><div class="conv-timer-fill" id="ctf" style="width:100%"></div></div><div class="conv-timer-label" id="ctl">25s</div>`;
    footer.appendChild(timerBar);
    footer.appendChild(continueBtn);

    convTimerID = setInterval(() => {
      secs--;
      const fill = timerBar.querySelector('#ctf');
      const lbl  = timerBar.querySelector('#ctl');
      if (fill) fill.style.width = Math.max(0, (secs/25)*100) + '%';
      if (lbl) { lbl.textContent = secs + 's'; if (secs <= 8) lbl.classList.add('ending'); }
      if (secs <= 0) {
        clearInterval(convTimerID); convTimerID = null;
        if (selectedVals.size === 0) selectedVals.add(typeof options[0] === 'string' ? options[0] : options[0].val);
        doSubmit();
      }
    }, 1000);
  } else {
    if (multi) footer.appendChild(continueBtn);
  }
}

function submitNome() {

/* ════════════════════════════════════════════════════

════════════════════════════════════════════════════ */
function stepServicos() {
  setProgress(45, 'Etapa 2 de 4 — Serviços');
  const svcs = SERVICES[st.tmpCat] || [];
  clearAnswerArea();
  hideAnswerArea();

  addInlineBlock(el => {
    el.id = 'svc-block';

    const selBar = document.createElement('div'); selBar.className = 'svc-selection-bar'; selBar.id = 'svc-sel-bar';
    selBar.innerHTML = `<div class="svc-selection-bar-label">Selecionados</div><div class="svc-chips" id="svc-chips"></div>`;
    el.appendChild(selBar);

    const list = document.createElement('div'); list.className = 'svc-category-list';

    svcs.forEach((svc, idx) => {
      const item = document.createElement('div');
      item.className = 'svc-category-item'; item.id = 'svc-cat-' + svc.key;

      const header = document.createElement('div');
      header.className = 'svc-category-header';
      header.innerHTML = `
        <div class="svc-category-header-left">
          <span class="svc-category-num">0${idx+1}</span>
          <span class="svc-category-name" id="svc-name-${svc.key}">${esc(svc.name)}</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="svc-category-badge" id="svc-badge-${svc.key}" style="display:none"></span>
          <svg class="svc-category-chevron" viewBox="0 0 14 14" fill="none"><path d="M3 5l4 4 4-4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>`;
      header.onclick = () => toggleSvcAccordion(svc.key, svcs);

      const body = document.createElement('div');
      body.className = 'svc-category-body'; body.id = 'svc-body-' + svc.key;
      const subList = document.createElement('div');
      subList.className = 'svc-sub-list';

      svc.subs.forEach(sub => {
        const subId = svc.key + '__' + sub.replace(/\s+/g, '_');
        const subItem = document.createElement('div');
        subItem.className = 'svc-sub-item'; subItem.id = 'svc-sub-item-' + subId;
        subItem.innerHTML = `
          <div class="svc-sub-item-left">
            <div class="svc-sub-item-name">${esc(sub)}</div>
          </div>
          <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
            <span class="svc-sub-item-time">${esc(svc.time)}</span>
            <div class="svc-sub-check" id="svc-check-${subId}">
              <svg viewBox="0 0 10 10" fill="none"><path d="M2 5l2 2 4-4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
          </div>`;
        subItem.onclick = () => toggleSubItem(svc.key, sub, svc.time, subId);
        subList.appendChild(subItem);
      });

      body.appendChild(subList);
      item.appendChild(header);
      item.appendChild(body);
      list.appendChild(item);
    });

    el.appendChild(list);

    const btn = document.createElement('button');
    btn.className = 'conv-action-btn'; btn.id = 'svc-confirm-btn';
    btn.textContent = 'Confirmar serviços';
    btn.onclick = confirmServicos;
    el.appendChild(btn);
  }, true);
}

function toggleSvcAccordion(key, svcs) {
  const item = document.getElementById('svc-cat-' + key);
  const isOpen = item.classList.contains('open');
  (svcs || SERVICES[st.tmpCat] || []).forEach(s => {
    const it = document.getElementById('svc-cat-' + s.key);
    if (it) it.classList.remove('open');
  });
  if (!isOpen) item.classList.add('open');
}

function toggleSubItem(parentKey, subName, time, subId) {
  const stateKey = parentKey + '__' + subName.replace(/\s+/g, '_');
  const subItem = document.getElementById('svc-sub-item-' + subId);
  const badge   = document.getElementById('svc-badge-' + parentKey);
  const header  = document.querySelector('#svc-cat-' + parentKey + ' .svc-category-header');

  if (st.tmpServices[stateKey]) {
    delete st.tmpServices[stateKey];
    if (subItem) subItem.classList.remove('selected');
  } else {
    st.tmpServices[stateKey] = { name: subName, time: time, parentKey: parentKey };
    if (subItem) subItem.classList.add('selected');
  }

  const countForParent = Object.values(st.tmpServices).filter(s => s.parentKey === parentKey).length;
  if (badge) {
    if (countForParent > 0) { badge.textContent = countForParent; badge.style.display = ''; }
    else { badge.style.display = 'none'; }
  }
  if (header) header.classList.toggle('has-selection', countForParent > 0);
  updateSvcSelectionBar();
}

function updateSvcSelectionBar() {
  const bar = document.getElementById('svc-sel-bar');
  const chips = document.getElementById('svc-chips');
  if (!bar || !chips) return;
  const entries = Object.entries(st.tmpServices);
  bar.classList.toggle('has-items', entries.length > 0);
  chips.innerHTML = entries.map(([key, info]) => {
    return `<div class="svc-chip">${esc(info.name)}<span class="svc-chip-x" onclick="removeSubItem('${key}')">×</span></div>`;
  }).join('');
}

function removeSubItem(stateKey) {
  const info = st.tmpServices[stateKey];
  if (!info) return;
  const parentKey = info.parentKey;
  delete st.tmpServices[stateKey];
  const subItem = document.getElementById('svc-sub-item-' + stateKey);
  if (subItem) subItem.classList.remove('selected');
  const badge = document.getElementById('svc-badge-' + parentKey);
  const header = document.querySelector('#svc-cat-' + parentKey + ' .svc-category-header');
  const countForParent = Object.values(st.tmpServices).filter(s => s.parentKey === parentKey).length;
  if (badge) { if (countForParent > 0) { badge.textContent = countForParent; badge.style.display = ''; } else badge.style.display = 'none'; }
  if (header) header.classList.toggle('has-selection', countForParent > 0);
  updateSvcSelectionBar();
}

function confirmServicos() {
  if (Object.keys(st.tmpServices).length === 0) {
    showToast('Selecione ao menos um procedimento ✨');
    return;
  }
  const profLabel = (PROFESSIONALS[st.tmpCat] || []).find(p => p.val === st.tmpProf);
  st.bookings = st.bookings.filter(b => b.category !== st.tmpCat);
  st.bookings.push({
    category: st.tmpCat,
    categoryLabel: CAT_LABELS[st.tmpCat],
    prof: st.tmpProf,
    profLabel: profLabel ? profLabel.name : 'Sem preferência',
    services: { ...st.tmpServices },
  });
  st.tmpServices = {};

  const block = document.getElementById('svc-block');
  if (block) {
    const btn = block.querySelector('.conv-action-btn');
    if (btn) btn.style.display = 'none';
    block.style.pointerEvents = 'none'; block.style.opacity = '0.6';
  }

  const svcNames = Object.values(st.bookings[st.bookings.length - 1].services).map(s => s.name).join(', ');
  addUserMsg(svcNames);

  const booked = st.bookings.map(b => b.category);
  const avail = Object.keys(CAT_LABELS).filter(k => !booked.includes(k));

  setTimeout(() => {
    if (avail.length > 0) {
      sendMessages([
        {html: 'Anotado! ✅', delay: 0},
        {html: 'Quer adicionar mais alguma categoria de serviço, ou podemos seguir para as datas?', delay: 900},
      ], () => {
        setProgress(58, 'Etapa 2 de 4 — Mais serviços?');
        renderAnswerArea((inner) => {
          const opts = [
            ...avail.map(k => ({ val: 'cat_' + k, label: '+ ' + CAT_LABELS[k] })),
            { val: 'finalizar', label: '→ Seguir para datas' }
          ];
          buildChipsArea(inner, {
            hint: 'O que deseja fazer?',
            options: opts, timed: false, multi: false,
            onSubmit: ([val]) => {
              if (val === 'finalizar') {
                addUserMsg('Seguir para as datas');
                clearAnswerArea();
                setTimeout(() => stepDatas(), 400);
              } else {
                const cat = val.replace('cat_', '');
                st.tmpCat = cat; st.tmpProf = null; st.tmpServices = {};
                addUserMsg(CAT_LABELS[cat]);
                clearAnswerArea();
                setTimeout(() => {
                  sendMessages([
                    {html: `<em>${CAT_LABELS[cat]}</em> — ótima escolha ✨`, delay: 0},
                    {html: 'Você tem preferência por alguma profissional?', delay: 900},
                  ], () => stepProfissional());
                }, 400);
              }
            }
          });
        });
      });
    } else {
      sendMessages([
        {html: 'Perfeito! Vamos escolher as melhores datas para você 📅', delay: 0},
      ], () => stepDatas());
    }
  }, 500);
}

/* ════════════════════════════════════════════════════
   STEP DATAS
════════════════════════════════════════════════════ */
function stepDatas() {
  setProgress(72, 'Etapa 3 de 4 — Disponibilidade');
  sendMessages([
    {html: 'Agora me informe <strong>até 3 opções de dias e horários</strong> que funcionam melhor para você.', delay: 0},
    {html: 'Assim conseguimos encontrar o encaixe perfeito na nossa agenda 💛', delay: 1000, insight: true},
  ], () => {
    clearAnswerArea();
    hideAnswerArea();
    addInlineBlock(el => {
      el.id = 'dates-block';
      el.innerHTML = `
        <div class="conv-form-hint">Apenas a <span class="hl">1ª opção</span> é obrigatória.</div>
        <div class="conv-dates-section">
          <div class="conv-date-row">
            <span class="conv-date-label">1ª opção <span class="req">*</span></span>
            <div class="conv-date-inputs">
              <input class="conv-date-input" id="d1" readonly placeholder="Data" onclick="openDatePicker(1)">
              <input class="conv-time-input" id="t1" readonly placeholder="Horário" onclick="openTimePicker(1)">
            </div>
          </div>
          <div class="conv-date-row">
            <span class="conv-date-label">2ª opção <span class="opt">(opcional)</span></span>
            <div class="conv-date-inputs">
              <input class="conv-date-input" id="d2" readonly placeholder="Data" onclick="openDatePicker(2)">
              <input class="conv-time-input" id="t2" readonly placeholder="Horário" onclick="openTimePicker(2)">
            </div>
          </div>
          <div class="conv-date-row">
            <span class="conv-date-label">3ª opção <span class="opt">(opcional)</span></span>
            <div class="conv-date-inputs">
              <input class="conv-date-input" id="d3" readonly placeholder="Data" onclick="openDatePicker(3)">
              <input class="conv-time-input" id="t3" readonly placeholder="Horário" onclick="openTimePicker(3)">
            </div>
          </div>
        </div>
        <div class="conv-date-error" id="date-error"></div>
        <button class="conv-action-btn" onclick="submitDatas()">Confirmar disponibilidade</button>
      `;
    }, true);
  });
}

function submitDatas() {
  const d1 = v('d1'), t1 = v('t1'), d2 = v('d2'), t2 = v('t2'), d3 = v('d3'), t3 = v('t3');
  const err = document.getElementById('date-error');
  ['d1','t1','d2','t2','d3','t3'].forEach(id => { const el = document.getElementById(id); if(el) el.classList.remove('field-error'); });
  const fail = (msg, ...ids) => {
    if(err) err.textContent = msg;
    ids.forEach(id => { const el = document.getElementById(id); if(el) el.classList.add('field-error'); });
    return false;
  };
  if (!d1) return fail('Selecione a data da 1ª opção.', 'd1');
  if (!t1) return fail('Selecione o horário da 1ª opção.', 't1');
  if (d2 && !t2) return fail('Selecione o horário da 2ª opção.', 't2');
  if (!d2 && t2) return fail('Selecione a data da 2ª opção.', 'd2');
  if (d3 && !t3) return fail('Selecione o horário da 3ª opção.', 't3');
  if (!d3 && t3) return fail('Selecione a data da 3ª opção.', 'd3');
  const fmt = (d, t) => d + ' às ' + t;
  if (d2 && t2 && fmt(d1,t1) === fmt(d2,t2)) return fail('1ª e 2ª opção têm o mesmo horário.','d1','t1','d2','t2');
  if (d3 && t3 && fmt(d1,t1) === fmt(d3,t3)) return fail('1ª e 3ª opção têm o mesmo horário.');
  if (d2&&t2&&d3&&t3 && fmt(d2,t2) === fmt(d3,t3)) return fail('2ª e 3ª opção têm o mesmo horário.');
  if(err) err.textContent = '';
  st.dates[0] = fmt(d1, t1);
  st.dates[1] = d2 && t2 ? fmt(d2, t2) : '';
  st.dates[2] = d3 && t3 ? fmt(d3, t3) : '';
  const block = document.getElementById('dates-block');
  if (block) { block.style.pointerEvents = 'none'; block.style.opacity = '0.6'; }
  addUserMsg(st.dates[0] + (st.dates[1] ? ' · ' + st.dates[1] : '') + (st.dates[2] ? ' · ' + st.dates[2] : ''));
  setTimeout(() => stepResumo(), 400);
}

function v(id) { const el = document.getElementById(id); return el ? el.value.trim() : ''; }

/* ════════════════════════════════════════════════════
   STEP RESUMO
════════════════════════════════════════════════════ */
function stepResumo() {
  setProgress(92, 'Etapa 4 de 4 — Confirmação');
  sendMessages([
    {html: `Tudo certo, <strong>${esc(st.nome)}</strong>! Confirme seu agendamento abaixo:`, delay: 0},
  ], () => {
    clearAnswerArea();
    hideAnswerArea();
    addInlineBlock(el => {
      const card = document.createElement('div');
      card.className = 'conv-summary-card';
      let rows = `<div class="conv-summary-row"><div class="conv-summary-label">Nome</div><div class="conv-summary-value">${esc(st.nome)}</div></div>`;
      st.bookings.forEach(b => {
        const svcLines = Object.values(b.services).map(s => {
          return esc(s.name) + `<span style="color:rgba(255,255,255,0.35);font-size:11px"> — ${esc(s.time)}</span>`;
        }).join('<br>');
        rows += `<div class="conv-summary-row">
          <div class="conv-summary-label">${esc(b.categoryLabel)}</div>
          <div class="conv-summary-value">
            <span style="font-size:11px;color:rgba(255,255,255,0.4);letter-spacing:0.1em;text-transform:uppercase">${esc(b.profLabel)}</span><br>${svcLines}
          </div>
        </div>`;
      });
      let datesVal = st.dates[0];
      if (st.dates[1]) datesVal += '<br>' + st.dates[1];
      if (st.dates[2]) datesVal += '<br>' + st.dates[2];
      rows += `<div class="conv-summary-row"><div class="conv-summary-label">Datas</div><div class="conv-summary-value">${datesVal}</div></div>`;
      card.innerHTML = rows;
      el.appendChild(card);

      const wa = document.createElement('button');
      wa.className = 'conv-wa-btn';
      wa.innerHTML = `<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326zM7.994 14.521a6.573 6.573 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.557 6.557 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592zm3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.729.729 0 0 0-.529.247c-.182.198-.691.677-.691 1.654 0 .977.71 1.916.81 2.049.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232z" fill="#FFFFFF"/></svg> Confirmar pelo WhatsApp`;
      wa.onclick = sendWhatsApp;

      const edit = document.createElement('button');
      edit.className = 'conv-action-btn ghost';
      edit.textContent = 'Voltar e editar';
      edit.onclick = () => { el.style.display = 'none'; stepDatas(); };

      el.appendChild(wa);
      el.appendChild(edit);
      setProgress(100, 'Pronto!');
    }, true);
  });
}

/* ════════════════════════════════════════════════════
   WHATSAPP
════════════════════════════════════════════════════ */
function sendWhatsApp() {
  let msg = `Olá! Gostaria de agendar um atendimento no Studio Belle 💛\n\n`;
  msg += `👤 *Nome:* ${st.nome}\n\n`;
  st.bookings.forEach(b => {
    msg += `✨ *${b.categoryLabel}*\n`;
    msg += `   Profissional: ${b.profLabel}\n`;
    Object.values(b.services).forEach(s => {
      msg += `   • ${s.name} (${s.time})\n`;
    });
    msg += '\n';
  });
  msg += `📅 *Disponibilidade:*\n   1ª opção: ${st.dates[0]}`;
  if (st.dates[1]) msg += `\n   2ª opção: ${st.dates[1]}`;
  if (st.dates[2]) msg += `\n   3ª opção: ${st.dates[2]}`;
  window.open(`https://wa.me/${WHATSAPP}?text=${encodeURIComponent(msg)}`, '_blank');
  showToast('Abrindo WhatsApp…');
}

/* ════════════════════════════════════════════════════
   DATE PICKER
════════════════════════════════════════════════════ */
let calYear, calMonth, activeDateN;

function openDatePicker(n) {
  activeDateN = n;
  document.getElementById('date-picker-title').textContent = `${n}ª opção — escolha a data`;
  const now = new Date();
  const existing = v('d' + n);
  if (existing) {
    const p = existing.split('/');
    if (p.length === 3) { calYear = parseInt(p[2]); calMonth = parseInt(p[1]) - 1; }
    else { calYear = now.getFullYear(); calMonth = now.getMonth(); }
  } else { calYear = now.getFullYear(); calMonth = now.getMonth(); }
  renderCal();
  openPicker('date-picker-overlay');
}

function renderCal() {
  document.getElementById('cal-month-label').textContent = MONTHS_PT[calMonth] + ' ' + calYear;
  const dowRow = document.getElementById('cal-dow-row');
  dowRow.innerHTML = '';
  DOWS.forEach(d => { const el = document.createElement('div'); el.className = 'cal-dow'; el.textContent = d; dowRow.appendChild(el); });
  const days = document.getElementById('cal-days');
  days.innerHTML = '';
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const total = new Date(calYear, calMonth + 1, 0).getDate();
  const today = new Date(); today.setHours(0,0,0,0);
  const curVal = v('d' + activeDateN);
  for (let i = 0; i < firstDay; i++) { const e = document.createElement('div'); e.className = 'cal-day cal-day--empty'; days.appendChild(e); }
  for (let d = 1; d <= total; d++) {
    const date = new Date(calYear, calMonth, d); date.setHours(0,0,0,0);
    const disabled = date.getDay() === 0 || date < today;
    const isToday = date.getTime() === today.getTime();
    const fmt = pad(d) + '/' + pad(calMonth+1) + '/' + calYear;
    const isSelected = fmt === curVal;
    const el = document.createElement('div');
    el.className = 'cal-day' + (disabled ? ' cal-day--disabled' : '') + (isToday ? ' cal-day--today' : '') + (isSelected ? ' cal-day--selected' : '');
    el.textContent = d;
    if (!disabled) el.onclick = () => { document.getElementById('d' + activeDateN).value = pad(d) + '/' + pad(calMonth+1) + '/' + calYear; closePicker('date-picker-overlay'); };
    days.appendChild(el);
  }
}

function calPrev() { calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; } renderCal(); }
function calNext() { calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; } renderCal(); }

/* ════════════════════════════════════════════════════
   TIME PICKER
════════════════════════════════════════════════════ */
let activeTimeN;

function openTimePicker(n) {
  activeTimeN = n;
  document.getElementById('time-picker-title').textContent = `${n}ª opção — escolha o horário`;
  const grid = document.getElementById('time-grid');
  grid.innerHTML = '';
  const curVal = v('t' + n);
  for (let h = 8; h <= 19; h++) {
    const mins = h === 19 ? [0] : [0, 30];
    mins.forEach(m => {
      const label = pad(h) + ':' + pad(m);
      const el = document.createElement('div');
      el.className = 'time-slot' + (curVal === label ? ' selected' : '');
      el.textContent = label;
      el.onclick = () => { document.getElementById('t' + activeTimeN).value = label; closePicker('time-picker-overlay'); };
      grid.appendChild(el);
    });
  }
  openPicker('time-picker-overlay');
}

/* ════════════════════════════════════════════════════
   PICKER HELPERS
════════════════════════════════════════════════════ */
function openPicker(id) {
  const el = document.getElementById(id); el.style.display = 'flex';
  requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('open')));
}
function closePicker(id) {
  const el = document.getElementById(id); el.classList.remove('open');
  setTimeout(() => { el.style.display = ''; }, 320);
}
function handlePickerOverlay(e, id) { if (e.target === document.getElementById(id)) closePicker(id); }

/* ════════════════════════════════════════════════════
   TOAST
════════════════════════════════════════════════════ */
const toastEl = document.getElementById('toast');
let toastT;
function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(() => toastEl.classList.remove('show'), 2400);
}

/* ════════════════════════════════════════════════════
   UTILS
════════════════════════════════════════════════════ */
function esc(str) { if (!str) return ''; return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function pad(n) { return String(n).padStart(2,'0'); }

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closePicker('date-picker-overlay'); closePicker('time-picker-overlay'); }
});
</script>
